  if(start){holding=true;holdTimer=Date.now();}
  else{
    if(!holding)return;
    holding=false;
    var holdMs=Date.now()-holdTimer;
    if(greenLight){
      playerY-=holdMs*0.05;
      if(playerY<goalY){
        // Reached goal
        round++;score+=100;
        playerY=H-60;goalY=40+Math.random()*80;
        lightDuration=800+Math.random()*2500;
        lightTimer=Date.now()+lightDuration;
        greenLight=Math.random()>0.3;
        playClick();
        updateScore();
      }
    }else{
      // Moved on red light
      gameRunning=false;
      playFail();
      var isNew=saveBest();
      document.getElementById('ov-title').textContent='🚨';
      document.getElementById('ov-sub').textContent=t('gameOver');
      document.getElementById('ov-stats').innerHTML='<div><b>'+score+'</b><span>'+t('scoreVal')+'</span></div><div><b>'+round+'</b><span>'+t('round')+'</span></div>'+(isNew?'<div>'+t('newBest')+'</div>':'');
      document.getElementById('ov-actions').innerHTML='<button class="btn primary" onclick="initGame()">'+t('newGame')+'</button>';
      document.getElementById('overlay').classList.add('show');
    }
    render();
  }
}

var loopRunning=false;
function startLoop(){if(loopRunning)return;loopRunning=true;requestAnimationFrame(gameLoop);}
function gameLoop(){
  if(!gameRunning){loopRunning=false;return;}
  // Check light change
  if(Date.now()>lightTimer){
    greenLight=!greenLight;
    lightDuration=800+Math.random()*2500;
    lightTimer=Date.now()+lightDuration;
    if(!greenLight)playClick();
  }
  // Auto-move while holding on green
  if(holding&&greenLight){
    playerY-=0.5;
    if(playerY<goalY){
      round++;score+=100;
      playerY=H-60;goalY=40+Math.random()*80;
      lightDuration=800+Math.random()*2500;
      lightTimer=Date.now()+lightDuration;
      greenLight=Math.random()>0.3;
      holding=false;
      playClick();
      updateScore();
    }
  }
  render();
  requestAnimationFrame(gameLoop);
}

function render(){
  ctx.clearRect(0,0,W,H);
  // Background gradient (road)
  var grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#2d3436');
  grad.addColorStop(1,'#636e72');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  // Road lines
  ctx.strokeStyle='rgba(255,255,255,.1)';ctx.lineWidth=2;ctx.setLineDash([20,20]);
  ctx.beginPath();ctx.moveTo(W/2,0);ctx.lineTo(W/2,H);ctx.stroke();ctx.setLineDash([]);
  // Goal line
  ctx.fillStyle='#ffce54';
  ctx.fillRect(0,goalY-3,W,6);
  ctx.fillStyle='rgba(255,206,84,.3)';
  ctx.font='10px sans-serif';ctx.textAlign='center';
  ctx.fillText('🏁',W/2,goalY-8);
  // Light indicator
  var lx=W/2,ly=20;
  ctx.beginPath();ctx.arc(lx,ly,12,0,Math.PI*2);
  ctx.fillStyle=greenLight?'#00b894':'#d63031';
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
  ctx.fillText(greenLight?'GO':'STOP',lx,ly+4);
  // Player (character)
  var px=W/2,py=playerY;
  ctx.fillStyle='#ff6b9d';
  ctx.beginPath();ctx.arc(px,py-10,10,0,Math.PI*2);ctx.fill(); // head
  ctx.fillStyle='#eaf0ff';
  ctx.fillRect(px-8,py,16,20); // body
  ctx.fillStyle='#b388ff';
  ctx.fillRect(px-10,py+18,8,12); // left leg
  ctx.fillRect(px+2,py+18,8,12); // right leg
  // Distance
  var dist=Math.max(0,playerY-goalY);
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('📏 '+Math.floor(dist),W/2,H-8);
  document.getElementById('mistakes').textContent=t('round')+': '+round+' | '+t('distance')+': '+Math.floor(dist);
}

function updateScore(){
  document.getElementById('score').textContent=score;
  document.getElementById('score-box').classList.remove('bump');
  void document.getElementById('score-box').offsetWidth;
  document.getElementById('score-box').classList.add('bump');
}
function updateBest(){document.getElementById('best').textContent=best;}
function saveBest(){if(score>best){best=score;localStorage.setItem('redlight_best',best);updateBest();return true;}return false;}

function setupSettings(){
  document.getElementById('sound-tgl').addEventListener('click',function(){soundEnabled=!soundEnabled;this.classList.toggle('on',soundEnabled);document.getElementById('mute-btn').textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('mute-btn').addEventListener('click',function(){soundEnabled=!soundEnabled;document.getElementById('sound-tgl').classList.toggle('on',soundEnabled);this.textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('vibrate-tgl').addEventListener('click',function(){vibrateEnabled=!vibrateEnabled;this.classList.toggle('on',vibrateEnabled);});
  document.getElementById('theme-sel').addEventListener('change',function(){document.documentElement.setAttribute('data-theme',this.value);});
  document.querySelectorAll('.langbtn').forEach(function(el){el.addEventListener('click',function(){lang=this.dataset.lang;applyLang();});});
  document.getElementById('settings-btn').addEventListener('click',function(){document.getElementById('settings-modal').classList.add('show');});
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.addEventListener('mousedown',function(e){handleInput(true);});
document.addEventListener('mouseup',function(e){handleInput(false);});
document.addEventListener('touchstart',function(e){e.preventDefault();handleInput(true);});
document.addEventListener('touchend',function(e){e.preventDefault();handleInput(false);});
window.addEventListener('resize',function(){resizeCanvas();render();});
window.startGame=initGame;window.initGame=initGame;window.closeModal=closeModal;
setupSettings();applyLang();updateBest();resizeCanvas();initGame();
})();
</script>
