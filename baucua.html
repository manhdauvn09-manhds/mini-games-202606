function rollDice(){
  if(rolling)return;
  var totalBet=bet.reduce(function(a,b){return a+b;},0);
  if(totalBet<=0){showToast('Chọn ô cược!');return;}
  rolling=true;animTimer=0;
  result=[];
  for(var i=0;i<3;i++)result.push(Math.floor(Math.random()*6));
  var intv=setInterval(function(){
    animTimer+=0.05;
    dice=[Math.floor(Math.random()*6),Math.floor(Math.random()*6),Math.floor(Math.random()*6)];
    render();
    if(animTimer>=1){
      clearInterval(intv);dice=result.slice();rolling=false;
      resolveBet();render();
    }
  },50);
}

function resolveBet(){
  // Stake was already deducted when each bet was placed (handleClick).
  // Pay back stake + 1x winnings for every die that matches a bet face.
  var winAmt=0,cnt={};
  for(var i=0;i<3;i++){cnt[result[i]]=(cnt[result[i]]||0)+1;}
  for(var f=0;f<6;f++){
    if(bet[f]>0&&cnt[f]){winAmt+=bet[f]*(1+cnt[f]);}
  }
  bet=[0,0,0,0,0,0];
  if(winAmt>0){
    coins+=winAmt;
    playWin();
    showToast('🎉 '+t('win')+' +'+winAmt);
  }else{
    playLose();
    showToast('😢 '+t('lose'));
  }
  round++;
  updateScore();
  if(coins>best){best=coins;localStorage.setItem('baucua_best',best);updateBest();}
  if(coins<=0){
    document.getElementById('ov-title').textContent='💸';
    document.getElementById('ov-sub').textContent='Hết tiền!';
    document.getElementById('ov-stats').innerHTML='<div><b>'+round+'</b><span>'+t('round')+'</span></div>';
    document.getElementById('ov-actions').innerHTML='<button class="btn primary" onclick="resetGame()">'+t('newGame')+'</button>';
    document.getElementById('overlay').classList.add('show');
  }
}

function totalBet(){return bet.reduce(function(a,b){return a+b;},0);}

function handleClick(e){
  if(rolling)return;
  var rect=canvas.getBoundingClientRect();
  var dpr=devicePixelRatio;
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  var ox=(canvas.width/dpr-3*CELL)/2,oy=20;
  var col=Math.floor((mx-ox)/CELL),row=Math.floor((my-oy)/CELL);
  if(col>=0&&col<3&&row>=0&&row<2){
    var idx=row*3+col;
    if(idx<6){
      if(coins>=10){bet[idx]+=10;coins-=10;playClick();updateScore();render();}
      else showToast('Hết xu!');
    }
  }
  // Roll button
  if(mx>canvas.width/dpr/2-50&&mx<canvas.width/dpr/2+50&&my>canvas.height/dpr-60&&my<canvas.height/dpr-20){
    rollDice();
  }
}

function render(){
  ctx.clearRect(0,0,canvas.width/devicePixelRatio,canvas.height/devicePixelRatio);
  var ox=(canvas.width/devicePixelRatio-3*CELL)/2,oy=20;
  for(var i=0;i<6;i++){
    var col=i%3,row=Math.floor(i/3);
    var x=ox+col*CELL,y=oy+row*CELL;
    ctx.fillStyle='rgba(255,255,255,.06)';
    ctx.beginPath();ctx.roundRect(x+4,y+4,CELL-8,CELL-8,12);ctx.fill();
    if(bet[i]>0){
      ctx.fillStyle='rgba(255,206,84,.15)';
      ctx.beginPath();ctx.roundRect(x+4,y+4,CELL-8,CELL-8,12);ctx.fill();
    }
    ctx.font='clamp(28px,6vw,44px) sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(faces[i].e,x+CELL/2,y+CELL/2-8);
    ctx.fillStyle='rgba(255,255,255,.5)';
    ctx.font='12px sans-serif';
    ctx.fillText(faces[i].n,x+CELL/2,y+CELL/2+22);
    if(bet[i]>0){
      ctx.fillStyle='#ffce54';
      ctx.font='bold 14px sans-serif';
      ctx.fillText('+'+bet[i],x+CELL/2,y+CELL/2+40);
    }
  }
  // Dice display
  var dy=oy+2*CELL+20;
  for(var i=0;i<3;i++){
    var dx=ox+i*CELL+CELL/2;
    ctx.fillStyle='rgba(255,255,255,.08)';
    ctx.beginPath();ctx.roundRect(dx-30,dy-30,60,60,12);ctx.fill();
    if(dice[i]!==undefined){
      ctx.font='32px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(faces[dice[i]].e,dx,dy);
    }
  }
  // Roll button
  var bx=canvas.width/devicePixelRatio/2,by=canvas.height/devicePixelRatio-40;
  ctx.fillStyle=rolling?'rgba(255,255,255,.15)':'rgba(255,206,84,.9)';
  ctx.beginPath();ctx.roundRect(bx-50,by-16,100,32,16);ctx.fill();
  ctx.fillStyle=rolling?'rgba(255,255,255,.5)':'#1a1205';
  ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(rolling?'🎲...':t('roll'),bx,by);
}

function showToast(msg){
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='show';
  setTimeout(function(){el.className='';},1300);
}

function updateScore(){
  document.getElementById('score').textContent=coins;
  document.getElementById('score-box').classList.remove('bump');
  void document.getElementById('score-box').offsetWidth;
  document.getElementById('score-box').classList.add('bump');
}
function updateBest(){document.getElementById('best').textContent=best;}

function resetGame(){
  coins=100;bet=[0,0,0,0,0,0];round=0;rolling=false;dice=[];result=[];
  document.getElementById('overlay').classList.remove('show');
  updateScore();updateBest();render();
}

function setupSettings(){
  document.getElementById('sound-tgl').addEventListener('click',function(){soundEnabled=!soundEnabled;this.classList.toggle('on',soundEnabled);document.getElementById('mute-btn').textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('mute-btn').addEventListener('click',function(){soundEnabled=!soundEnabled;document.getElementById('sound-tgl').classList.toggle('on',soundEnabled);this.textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('vibrate-tgl').addEventListener('click',function(){vibrateEnabled=!vibrateEnabled;this.classList.toggle('on',vibrateEnabled);});
  document.getElementById('theme-sel').addEventListener('change',function(){document.documentElement.setAttribute('data-theme',this.value);});
  document.querySelectorAll('.langbtn').forEach(function(el){el.addEventListener('click',function(){lang=this.dataset.lang;applyLang();});});
  document.getElementById('settings-btn').addEventListener('click',function(){document.getElementById('settings-modal').classList.add('show');});
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
canvas.addEventListener('mousedown',function(e){handleClick(e);});
canvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];handleClick({clientX:t.clientX,clientY:t.clientY});});
window.addEventListener('resize',function(){resizeCanvas();render();});
window.startGame=resetGame;window.resetGame=resetGame;window.closeModal=closeModal;
setupSettings();applyLang();resizeCanvas();render();
})();
</script>
</body>
</html>
