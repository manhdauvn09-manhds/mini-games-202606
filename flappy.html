<style>
  :root{ --ink:#0b1026; --gold:#ffce54; --cyan:#34e0ff; --accentA:#7ef0c0; --accentB:#34d3b6;
    --panelTop:rgba(28,34,72,.94); --panelBot:rgba(14,18,40,.97); --txt:#fff; --sub:#aab4dc;
    --hudBg:rgba(8,12,30,.42); }
  /* Theme: midnight (default) keeps :root above. Others override. */
  html[data-theme="aurora"]{ --gold:#9affd0; --cyan:#7af0ff; --accentA:#7af0ff; --accentB:#6ad0ff;
    --panelTop:rgba(16,52,58,.94); --panelBot:rgba(8,24,34,.97); --sub:#9fd6dc; --hudBg:rgba(6,26,30,.45); }
  html[data-theme="sunset"]{ --gold:#ffd27a; --cyan:#ff9ad0; --accentA:#ffb37a; --accentB:#ff7a8f;
    --panelTop:rgba(74,32,52,.94); --panelBot:rgba(36,14,28,.97); --sub:#e2b4c4; --hudBg:rgba(40,14,26,.45); }
  html[data-theme="light"]{ --ink:#eef2fb; --gold:#c98a16; --cyan:#1c8fb0; --accentA:#34d3b6; --accentB:#1fb5a0;
    --panelTop:rgba(255,255,255,.96); --panelBot:rgba(232,238,250,.98); --txt:#16203a; --sub:#5a6488;
    --hudBg:rgba(255,255,255,.6); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; overflow:hidden; background:var(--ink);
    font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif; color:var(--txt);
    user-select:none; -webkit-user-select:none; touch-action:none; }
  /* safe-area insets (iPhone notch / home indicator) */
  :root{ --sat:env(safe-area-inset-top,0px); --sar:env(safe-area-inset-right,0px);
    --sab:env(safe-area-inset-bottom,0px); --sal:env(safe-area-inset-left,0px); }
  /* every tappable control: kill 300ms delay + double-tap zoom */
  button,.btn,.langbtn,.diffbtn,.skin,.themeBtn,.iconbtn,.tgl,input[type=range]{ touch-action:manipulation; }
  #app{ position:fixed; inset:0; }
  canvas#c{ position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* ---------- HUD ---------- */
  #hud{ position:absolute; inset:0; pointer-events:none; z-index:3; }
  #scoreBig{ position:absolute; top:5vh; left:0; right:0; text-align:center;
    font-size:min(15vw,90px); font-weight:900; letter-spacing:1px;
    text-shadow:0 4px 0 rgba(0,0,0,.25), 0 0 24px rgba(0,0,0,.35); opacity:0; transition:opacity .2s; }
  #scoreBig.show{ opacity:1; }
  .corner{ position:absolute; top:calc(14px + var(--sat)); display:flex; align-items:center; gap:7px;
    font-weight:800; font-size:clamp(14px,3.6vw,20px); padding:7px 13px; border-radius:999px;
    background:rgba(8,12,30,.42); backdrop-filter:blur(7px); border:1px solid rgba(255,255,255,.12);
    box-shadow:0 8px 22px -12px #000; opacity:0; transition:opacity .25s; }
  .corner.show{ opacity:1; }
  #coinHud{ left:calc(14px + var(--sal)); color:var(--gold); }
  #bestHud{ right:calc(14px + var(--sar)); color:#cfe0ff; }
  .corner .ic{ font-size:1.15em; line-height:1; }

  /* ---------- Panels ---------- */
  .overlay{ position:absolute; inset:0; z-index:5; display:flex; align-items:center; justify-content:center;
    padding:calc(18px + var(--sat)) calc(18px + var(--sar)) calc(18px + var(--sab)) calc(18px + var(--sal));
    opacity:0; pointer-events:none; transition:opacity .3s ease; }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .panel{ width:min(440px,94vw); border-radius:26px; padding:22px 22px 20px; text-align:center;
    background:linear-gradient(180deg, var(--panelTop), var(--panelBot));
    border:1px solid rgba(255,255,255,.14); box-shadow:0 30px 70px -30px #000, inset 0 1px 0 rgba(255,255,255,.08);
    transform:translateY(14px) scale(.98); transition:transform .3s cubic-bezier(.2,.9,.3,1.2);
    max-height:calc(100vh - 36px - var(--sat) - var(--sab)); overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
  .overlay.show .panel{ transform:none; }

  .langrow{ display:flex; gap:8px; justify-content:center; margin-bottom:12px; }
  .langbtn{ pointer-events:auto; cursor:pointer; font-size:13px; font-weight:800; padding:0 15px; min-height:44px; border-radius:999px;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.06); color:#cfd6f0; transition:.12s; }
  .langbtn:hover{ border-color:var(--cyan); }
  .langbtn.sel{ background:linear-gradient(180deg,#ffd76a,#ff9f43); color:#1a1205; border-color:transparent; }

  .logo{ font-size:clamp(38px,11vw,64px); font-weight:900; line-height:.95; margin:2px 0 2px;
    background:linear-gradient(90deg,#ffd54a,#ff8d5c,#ff5d8f,#b388ff,#34e0ff); -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 6px 30px rgba(255,140,90,.25); }
  .logo small{ display:block; -webkit-text-fill-color:#fff; color:#fff; font-size:.34em; letter-spacing:5px; font-weight:800; opacity:.85; }
  .tagline{ color:#aab4dc; font-size:13.5px; margin:4px 0 14px; }

  .stats{ display:flex; gap:10px; margin:6px 0 14px; }
  .stat{ flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.10); border-radius:16px; padding:11px 6px; }
  .stat b{ display:block; font-size:clamp(20px,6vw,30px); line-height:1; }
  .stat span{ font-size:11px; color:#9fa9d2; letter-spacing:1px; text-transform:uppercase; }
  .stat.gold b{ color:var(--gold); }

  .btn{ pointer-events:auto; cursor:pointer; border:none; border-radius:16px; font-weight:900;
    font-size:clamp(17px,4.6vw,21px); padding:15px 18px; width:100%; color:#08122a;
    background:linear-gradient(180deg,var(--accentA),var(--accentB)); box-shadow:0 12px 26px -10px #18b28e, inset 0 1px 0 rgba(255,255,255,.5);
    transition:transform .12s, filter .12s; letter-spacing:.5px; }
  .btn:active{ transform:translateY(2px) scale(.99); filter:brightness(1.05); }
  .btn.primary{ background:linear-gradient(180deg,#ffd76a,#ff9f43); box-shadow:0 12px 26px -10px #c9772a, inset 0 1px 0 rgba(255,255,255,.5); }
  .btn.ghost{ background:rgba(127,127,140,.16); color:var(--txt); box-shadow:inset 0 0 0 1px rgba(127,127,140,.28); }
  /* focus-visible accessibility outline */
  :focus-visible{ outline:3px solid var(--cyan); outline-offset:2px; }
  button:focus-visible{ outline:3px solid var(--cyan); outline-offset:3px; }
  .btnrow{ display:flex; gap:10px; margin-top:10px; }
  .btnrow .btn{ width:auto; flex:1; }

  .diffrow{ display:flex; gap:8px; justify-content:center; }
  .diffbtn{ pointer-events:auto; cursor:pointer; flex:1; font-size:14px; font-weight:800; padding:10px 6px; min-height:44px; border-radius:14px;
    display:inline-flex; align-items:center; justify-content:center;
    border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.05); color:#cfd6f0; transition:transform .12s, border-color .12s, background .12s; }
  .diffbtn:hover{ transform:translateY(-2px); border-color:var(--cyan); }
  .diffbtn.sel{ background:linear-gradient(180deg,#7ef0c0,#34d3b6); color:#08122a; border-color:transparent; }

  /* Skins */
  .seclabel{ display:flex; align-items:center; gap:8px; color:#9fa9d2; font-size:12px; letter-spacing:1px;
    text-transform:uppercase; margin:16px 4px 8px; }
  .seclabel::after{ content:""; flex:1; height:1px; background:rgba(255,255,255,.12); }
  .preview{ display:flex; flex-direction:column; align-items:center; gap:1px; margin:2px 0 10px; }
  #skinPrev{ width:128px; height:80px; display:block; }
  .skinName{ font-weight:800; font-size:16px; }
  .skinSkill{ font-size:12px; color:#7ef0c0; font-weight:800; }
  .skins{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:18px; }
  .skin{ position:relative; width:50px; height:50px; border-radius:14px; cursor:pointer; pointer-events:auto;
    background:rgba(255,255,255,.05); border:2px solid transparent; display:flex; align-items:center; justify-content:center;
    transition:transform .12s, border-color .12s; }
  .skin:hover{ transform:translateY(-2px); }
  .skin.sel{ border-color:#fff; box-shadow:0 0 0 3px rgba(52,224,255,.4); }
  .skin.locked{ filter:grayscale(.7) brightness(.6); }
  .skin .lock{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:17px; }
  .skin .price{ position:absolute; bottom:-15px; left:0; right:0; text-align:center; font-size:9.5px; color:var(--gold); font-weight:800; }

  /* Game over medal */
  .medal{ font-size:clamp(54px,16vw,84px); line-height:1; margin:2px 0 2px; filter:drop-shadow(0 8px 16px rgba(0,0,0,.45)); }
  .medalName{ font-weight:900; font-size:clamp(20px,6vw,28px); letter-spacing:1px; margin-bottom:2px; }
  .newbest{ display:inline-block; margin:6px 0 2px; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:900;
    letter-spacing:1px; background:linear-gradient(90deg,#ffd54a,#ff8d5c); color:#3a1d00; animation:pop .5s; }
  @keyframes pop{ 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }

  .hint{ color:#aab4dc; font-size:13px; margin-top:12px; line-height:1.5; }
  .kbd{ background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.18); border-bottom-width:2px;
    border-radius:6px; padding:1px 7px; font-size:12px; font-weight:700; }

  #topctl{ position:absolute; top:calc(12px + var(--sat)); left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:4; }
  .iconbtn{ pointer-events:auto; cursor:pointer; width:44px; height:44px; border-radius:13px; border:1px solid rgba(255,255,255,.14);
    background:rgba(8,12,30,.42); backdrop-filter:blur(7px); color:#fff; font-size:19px; display:none; align-items:center; justify-content:center; }
  .iconbtn.show{ display:flex; }
  .iconbtn:active{ transform:scale(.92); }

  #tapHint{ position:absolute; left:0; right:0; bottom:calc(18vh + var(--sab)); text-align:center; z-index:3; pointer-events:none;
    font-weight:800; font-size:clamp(16px,4.4vw,22px); color:#fff; text-shadow:0 2px 10px rgba(0,0,0,.5);
    opacity:0; transition:opacity .25s; }
  #tapHint.show{ opacity:1; animation:bob 1.1s ease-in-out infinite; }
  @keyframes bob{ 50%{ transform:translateY(-8px) } }

  /* ---------- Settings rows ---------- */
  .setRow{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin:10px 2px;
    font-size:14.5px; font-weight:700; color:var(--txt); }
  .setRow .lbl{ display:flex; align-items:center; gap:8px; }
  input[type=range]{ -webkit-appearance:none; appearance:none; width:56%; height:8px; border-radius:999px;
    background:rgba(127,127,140,.3); outline:none; }
  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; width:22px; height:22px; border-radius:50%;
    background:linear-gradient(180deg,#ffd76a,#ff9f43); cursor:pointer; box-shadow:0 2px 6px rgba(0,0,0,.4); }
  input[type=range]::-moz-range-thumb{ width:22px; height:22px; border:none; border-radius:50%;
    background:linear-gradient(180deg,#ffd76a,#ff9f43); cursor:pointer; }
  .tgl{ position:relative; width:50px; height:28px; border-radius:999px; border:none; cursor:pointer;
    background:rgba(127,127,140,.35); transition:.18s; flex:none; }
  .tgl[aria-checked="true"]{ background:linear-gradient(90deg,var(--accentA),var(--accentB)); }
  /* invisible >=44px tap area without changing the toggle's look */
  .tgl::before{ content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:max(100%,44px); height:44px; }
  .tgl::after{ content:""; position:absolute; top:3px; left:3px; width:22px; height:22px; border-radius:50%;
    background:#fff; transition:.18s; box-shadow:0 2px 4px rgba(0,0,0,.4); }
  .tgl[aria-checked="true"]::after{ transform:translateX(22px); }
  .themeRow{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .themeBtn{ pointer-events:auto; cursor:pointer; width:44px; height:44px; border-radius:12px; padding:0;
    border:2px solid transparent; transition:transform .12s, border-color .12s; }
  .themeBtn:hover{ transform:translateY(-2px); }
  .themeBtn.sel{ border-color:#fff; box-shadow:0 0 0 3px rgba(52,224,255,.4); }

  /* ---------- Achievements ---------- */
  .achGrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:6px 0 4px; }
  .ach{ background:rgba(127,127,140,.10); border:1px solid rgba(127,127,140,.18); border-radius:14px;
    padding:9px 4px 7px; text-align:center; }
  .ach.locked{ filter:grayscale(.9) brightness(.62); }
  .ach .aic{ font-size:24px; line-height:1.1; }
  .ach .anm{ font-size:9.5px; font-weight:800; color:var(--sub); margin-top:2px; line-height:1.15; }
  .ach.got{ border-color:var(--gold); box-shadow:0 0 0 1px var(--gold); }

  /* ---------- Toast ---------- */
  #toasts{ position:absolute; top:64px; left:0; right:0; z-index:9; display:flex; flex-direction:column;
    align-items:center; gap:8px; pointer-events:none; }
  .toast{ background:linear-gradient(180deg,#ffd76a,#ff9f43); color:#3a1d00; font-weight:900; font-size:14px;
    padding:10px 16px; border-radius:999px; box-shadow:0 12px 26px -10px #000; display:flex; align-items:center; gap:8px;
    animation:toastIn .3s ease, toastOut .3s ease 2.7s forwards; max-width:90vw; }
  .toast .tic{ font-size:20px; }
  @keyframes toastIn{ from{ transform:translateY(-20px); opacity:0 } to{ transform:none; opacity:1 } }
  @keyframes toastOut{ to{ transform:translateY(-20px); opacity:0 } }

  /* daily badge */
  .dailyBadge{ display:inline-flex; align-items:center; gap:6px; margin:2px 0 0; padding:5px 12px; border-radius:999px;
    font-size:12px; font-weight:800; background:rgba(127,127,140,.16); color:var(--sub); }
  .dailyBadge b{ color:var(--gold); }
  .miniHint{ color:var(--sub); font-size:11.5px; line-height:1.5; margin:8px 4px 2px; text-align:left; }
  .miniHint b{ color:var(--txt); }
  .sr-only{ position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); border:0; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; transition-duration:.06s !important; }
  }
</style>

    { id:'classic', price:0,   perk:0.00, body:'#ffd54a', belly:'#fff0b8', wing:'#f0a93b', beak:'#ff7a3c', trail:'#ffe08a' },
    { id:'robin',   price:0,   perk:0.06, body:'#4fb0ff', belly:'#d9f0ff', wing:'#2f7fd6', beak:'#ffb13c', trail:'#bfe4ff' },
    { id:'mint',    price:40,  perk:0.14, body:'#54e0b0', belly:'#dffff3', wing:'#26b98c', beak:'#ff9f43', trail:'#bff7e4' },
    { id:'rose',    price:90,  perk:0.22, body:'#ff7aa8', belly:'#ffe0ec', wing:'#e0467f', beak:'#ffd24a', trail:'#ffc6dc' },
    { id:'shadow',  price:180, perk:0.32, body:'#7b86e8', belly:'#c4caff', wing:'#4a52b8', beak:'#9fd0ff', trail:'#b9c0ff' },
    { id:'phoenix', price:320, perk:0.42, body:'#ff7a3c', belly:'#ffd27a', wing:'#e63e2e', beak:'#ffe04a', trail:'#ff9a3c', fire:true },
    { id:'galaxy',  price:520, perk:0.52, body:'#9b6bff', belly:'#d9c6ff', wing:'#5a3fd6', beak:'#34e0ff', trail:'#c9a6ff', spark:true },
  ];
  const skinById=id=>SKINS.find(s=>s.id===id)||SKINS[0];
  // real economy: a skin is unlocked ONLY if owned (purchased). price>0 must be bought.
  const isOwned=s=>s.price===0||save.owned.includes(s.id);
  const unlocked=isOwned;
  const canAfford=s=>save.coins>=s.price;
  const skinName=s=>L().skins[s.id]||s.id;

  // ===================== Audio =====================
  const AU={ ctx:null, musicNodes:null,
    ensure(){ if(!this.ctx){ try{this.ctx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } if(this.ctx&&this.ctx.state==='suspended')this.ctx.resume(); },
    sfxOff(){ return save.muted || save.sfx===false || (save.vol||0)<=0; },
    gv(){ return clamp(save.vol==null?0.8:save.vol,0,1); },
    tone(f1,f2,dur,type,vol){ if(this.sfxOff()||!this.ctx)return; const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.type=type||'sine'; o.frequency.setValueAtTime(f1,t); if(f2)o.frequency.exponentialRampToValueAtTime(Math.max(1,f2),t+dur);
      const V=Math.max(.0002,(vol||.18)*this.gv());
      g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(V,t+.008); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      o.connect(g).connect(this.ctx.destination); o.start(t); o.stop(t+dur+.02); },
    noise(dur,vol){ if(this.sfxOff()||!this.ctx)return; const t=this.ctx.currentTime,n=this.ctx.sampleRate*dur,buf=this.ctx.createBuffer(1,n,this.ctx.sampleRate),d=buf.getChannelData(0);
      for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*(1-i/n);
      const s=this.ctx.createBufferSource();s.buffer=buf;const g=this.ctx.createGain();
      g.gain.setValueAtTime((vol||.25)*this.gv(),t);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
      const f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=1200;
      s.connect(f).connect(g).connect(this.ctx.destination);s.start(t); },
    // ---- ambient music loop (pure WebAudio synth, gentle pad arpeggio) ----
    startMusic(){ if(!this.ctx||save.music===false||save.muted) return; if(this.musicNodes) return;
      const master=this.ctx.createGain(); master.gain.value=0.05*this.gv(); master.connect(this.ctx.destination);
      const notes=[261.63,329.63,392.00,523.25,392.00,329.63]; let i=0; const self=this;
      const tick=()=>{ if(!self.musicNodes) return; const t=self.ctx.currentTime, f=notes[i%notes.length]; i++;
        const o=self.ctx.createOscillator(), g=self.ctx.createGain(); o.type='triangle'; o.frequency.value=f;
        g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(1,t+.4); g.gain.exponentialRampToValueAtTime(.0001,t+1.4);
        o.connect(g).connect(master); o.start(t); o.stop(t+1.5); };
      const id=setInterval(tick,650); tick();
      this.musicNodes={master,id}; },
    stopMusic(){ if(this.musicNodes){ clearInterval(this.musicNodes.id); try{this.musicNodes.master.disconnect();}catch(e){} this.musicNodes=null; } },
    setMusic(on){ if(on){ this.ensure(); this.startMusic(); } else this.stopMusic(); },
    syncVol(){ if(this.musicNodes) this.musicNodes.master.gain.value=0.05*this.gv()*(save.music!==false&&!save.muted?1:0); },
    flap(){this.tone(420,720,.12,'sine',.16);}, score(){this.tone(700,990,.10,'triangle',.16);},
    coin(){this.tone(1180,1760,.09,'square',.10);}, near(){this.tone(880,1320,.14,'triangle',.14);},
    power(){this.tone(520,1040,.18,'sawtooth',.12);setTimeout(()=>this.tone(780,1320,.16,'triangle',.12),60);},
    shieldBreak(){this.tone(900,180,.22,'square',.16);this.noise(.2,.18);},
    hazard(){this.tone(260,120,.12,'sawtooth',.10);},
    milestone(){[523,659,784,1046].forEach((f,i)=>setTimeout(()=>this.tone(f,f,.12,'triangle',.14),i*70));},
    hit(){this.tone(300,70,.3,'sawtooth',.2);this.noise(.28,.3);}
  };

  // ===================== Game state =====================
  let state='menu', bird=null;
  let pipes=[], coins=[], powers=[], hazards=[], parts=[], texts=[], trail=[];
  let score=0, runCoins=0, combo=0, comboT=0, mult=1, pipesPassed=0;
  let runNear=0, runMaxCombo=0, usedPowerup=false, resumeCount=0;  // run-scoped tracking
  let coinPersistAcc=0, liveBestShown=false;
  let worldScroll=0, speed=0, gap=0, spacing=0, moving=false, hazardChance=0, diffD=0, playTime=0;
  let shake=0, flash=0, flashCol='255,255,255', hitStop=0, deadT=0;
  let shield=false, magnetT=0, slowT=0, dblT=0, invul=0;
  let hitFactor=0.82, nearGen=0;
  let tod=0.32, clouds=[], stars=[], hills=[], lastMilestone=0;

  const BASE_SPEED=()=>clamp(W*0.30,200,460);
  const BASE_DIFF={ easy:-0.18, normal:0, hard:0.5 };
  const diffLevel=()=>BASE_DIFF[save.diff]!=null?save.diff:'normal';
  function difficulty(){
    const lvl=diffLevel(), base=BASE_DIFF[lvl];
    const ds=score/45, dtime=playTime/40;        // time pushes difficulty: ~0.75 at 30s
    // per-level offset shifts the whole ramp; clamp wider so 'hard' can reach beyond auto-ramp
    diffD=clamp(Math.max(ds,dtime)+base,0,1.5);
    const d1=Math.min(diffD,1);
    speed=BASE_SPEED()*(1 + 0.85*Math.min(diffD,1.25));
    gap=H*(0.34 - 0.135*d1);
    if(lvl==='easy') gap+=H*0.03;                 // easy: slightly wider gaps, more forgiving
    const sBase=clamp(W*0.36,165,275);
    spacing=Math.max(150, sBase*(1 - 0.24*d1));    // columns get closer with difficulty
    moving = diffD>0.30;
    hazardChance = clamp((d1-0.42)*0.55, 0, 0.32); // spike balls appear after ~30s / score 19
    if(lvl==='easy') hazardChance*=0.55;          // easy: fewer hazards
  }
  const groundY=()=>GROUND;

  function buildBackdrop(){
    clouds=[];for(let i=0;i<6;i++)clouds.push({x:rand(0,W),y:rand(H*0.06,H*0.42),s:rand(0.6,1.5),sp:rand(6,16)});
    stars=[];for(let i=0;i<70;i++)stars.push({x:rand(0,W),y:rand(0,H*0.7),r:rand(0.5,1.6),tw:rand(0,6.28)});
    hills=[];for(let i=0;i<2;i++){const pts=[];for(let j=0;j<=8;j++)pts.push(rand(0.3,1));hills.push({pts});}
  }

  function resetWorld(){
    // seed RNG: daily challenge uses date-keyed deterministic stream; otherwise true random
    if(dailyMode){ rng=mulberry32((parseInt(todayKey(),10)>>>0)^0x9e3779b9); }
    else rng=Math.random;
    const sk=skinById(save.selected);
    hitFactor=0.82 - sk.perk*0.30;       // higher-tier skins = smaller hitbox = pass gates easier
    nearGen=H*(0.045 + sk.perk*0.03);    // and slightly more generous near-miss bonus
    bird={ x:W*0.30, y:H*0.46, vy:0, rot:0, r:Math.max(13,H*0.026), flap:0, wing:0 };
    pipes=[];coins=[];powers=[];hazards=[];parts=[];texts=[];trail=[];
    score=0;runCoins=0;combo=0;comboT=0;mult=1;pipesPassed=0;
    runNear=0;runMaxCombo=0;usedPowerup=false;resumeCount=0;coinPersistAcc=0;liveBestShown=false;
    worldScroll=0;shake=0;flash=0;hitStop=0;deadT=0;playTime=0;
    shield=false;magnetT=0;slowT=0;dblT=0;invul=0;lastMilestone=0;
    difficulty(); updateHud();
  }

  // ===================== Spawning =====================
  function spawnPipe(){
    difficulty();
    const d1=Math.min(diffD,1), margin=H*0.10, pw=clamp(W*0.13,58,92);
    let g=gap; if(d1>0.5 && rng()<0.18) g*=0.82;   // occasional extra-narrow gap
    const gy=clamp(rnd(margin+g/2, GROUND-margin-g/2), g/2+10, GROUND-g/2-10);
    const x=W+pw+(pipes.length===0? W*0.12:0);
    pipes.push({ x, w:pw, gy, baseGy:gy, gap:g, scored:false,
      amp: moving? rnd(H*0.04,H*0.11):0, ph:rnd(0,6.28), minClear:1e9, narrow:g<gap-1 });
    // rewards between this pipe and the next
    const fx=x+spacing*0.5;
    if(rng() < 0.15 + d1*0.13){
      powers.push({ x:fx, y:gy+rnd(-g*0.18,g*0.18), r:Math.max(15,H*0.03), type:rchoice(['shield','magnet','slow','double']), t:0 });
    } else {
      const n=3+Math.round(d1*3), spread=g*0.5;
      for(let i=0;i<n;i++) coins.push({ x:fx+(i-(n-1)/2)*Math.max(24,W*0.028), y:gy+Math.sin(i)*spread*0.25, r:Math.max(9,H*0.016), spin:rnd(0,6.28), got:false });
    }
    // spinning spike hazard (higher difficulty)
    if(rng()<hazardChance){
      hazards.push({ x:x+spacing*0.72, baseY:clamp(rnd(H*0.28,GROUND-H*0.22),H*0.2,GROUND-H*0.2),
        amp:rnd(H*0.10,H*0.20), ph:rnd(0,6.28), r:Math.max(13,H*0.027), spin:0 });
    }
  }

  // ===================== Effects =====================
  function burst(x,y,col,n,spd,opt){ opt=opt||{};
    for(let i=0;i<n;i++){ const a=rand(0,6.28),s=rand(spd*0.3,spd);
      parts.push({x,y,vx:Math.cos(a)*s+(opt.vx||0),vy:Math.sin(a)*s+(opt.vy||0),r:rand(2,opt.r||5),col,life:rand(0.4,opt.life||0.8),max:0.8,grav:opt.grav==null?900:opt.grav}); }
    if(parts.length>260)parts.splice(0,parts.length-260);
  }
  function ftext(x,y,t,col,size){ texts.push({x,y,t,col:col||'#fff',size:size||22,life:0.9,max:0.9,vy:-46}); }
  function doShake(a){shake=Math.max(shake,a);} function doFlash(a,col){flash=Math.max(flash,a);flashCol=col||'255,255,255';}
  function addCombo(){ combo++; comboT=2.4; if(combo>runMaxCombo)runMaxCombo=combo; const m=clamp(1+Math.floor(combo/4),1,8);
    if(m>mult&&m>1) ftext(bird.x, bird.y-bird.r-26, 'x'+m+'!', '#ffd54a', 26); mult=m;
    if(m>=8) unlockAch('combo8'); }
  function pts(base){ const p=base*mult*(dblT>0?2:1); score+=p; return p; }

  // ===================== Input =====================
  function flap(){
    if(state==='menu'||state==='pause'||state==='dead')return;
    if(state==='ready'){ state='play'; $('scoreBig').classList.add('show'); $('tapHint').classList.remove('show'); }
    bird.vy=-Math.max(360,H*0.62); bird.flap=1; bird.wing=1; AU.flap();
    burst(bird.x-bird.r*0.6, bird.y+bird.r*0.5, 'rgba(255,255,255,.7)', 5, 120, {grav:120,life:0.4,r:3});
  }
  function press(){ AU.ensure(); flap(); }
  cv.addEventListener('pointerdown', e=>{ e.preventDefault(); press(); }, {passive:false});
  window.addEventListener('keydown', e=>{
    if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); AU.ensure(); if(state==='menu')startGame(); else flap(); }
    else if(e.code==='KeyP'||e.code==='Escape'){ togglePause(); }
    else if(e.code==='KeyM'){ toggleMute(); }
    else if(e.code==='KeyR'&&(state==='dead'||state==='pause')){ startGame(); }
  });

  // ===================== Update =====================
  function update(dt){
    tod=(tod+dt*0.018)%1;
    for(const c of clouds){ c.x-=c.sp*dt*(0.4+(state==='play'?speed/700:0)); if(c.x<-120){c.x=W+rand(20,120);c.y=rand(H*0.06,H*0.42);} }
    for(const s of stars) s.tw+=dt*2;
    if(comboT>0){comboT-=dt;if(comboT<=0){combo=0;mult=1;}}
    if(magnetT>0)magnetT-=dt; if(slowT>0)slowT-=dt; if(dblT>0)dblT-=dt; if(invul>0)invul-=dt;
    shake=Math.max(0,shake-dt*60); flash=Math.max(0,flash-dt*2.4);

    if(state==='ready'){ bird.y=H*0.46+Math.sin(performance.now()/300)*10; bird.rot=0; bird.wing*=0.9; trailPush(); return; }
    if(state==='dead'){ deadFall(dt); return; }
    if(state!=='play') return;
    if(hitStop>0){ hitStop-=dt; return; }

    playTime+=dt; difficulty();
    const ts=slowT>0?0.5:1, wdt=dt*ts, sp=speed*ts;
    worldScroll+=sp*dt;

    const G=Math.max(1400,H*2.5);
    bird.vy+=G*wdt; bird.y+=bird.vy*wdt;
    bird.flap*=Math.pow(0.001,dt); bird.wing*=Math.pow(0.0001,dt);
    bird.rot=clamp(bird.vy/(H*1.1),-0.5,1.2);
    if(bird.y<bird.r){ bird.y=bird.r; bird.vy=Math.max(bird.vy,0); }
    trailPush();

    // spawn based on rightmost pipe (fixed cadence/spacing)
    const lastP=pipes.length?pipes[pipes.length-1]:null;
    if(!lastP || lastP.x <= W - spacing) spawnPipe();

    const hr=bird.r*hitFactor;
    for(const p of pipes){
      p.x-=sp*dt;
      if(p.amp>0) p.gy=clamp(p.baseGy+Math.sin(worldScroll*0.006+p.ph)*p.amp, p.gap/2+H*0.06, GROUND-p.gap/2-H*0.06);
      const gapTop=p.gy-p.gap/2, gapBot=p.gy+p.gap/2;
      if(bird.x+bird.r>p.x && bird.x-bird.r<p.x+p.w) p.minClear=Math.min(p.minClear, bird.y-bird.r-gapTop, gapBot-(bird.y+bird.r));
      if(bird.x+hr>p.x && bird.x-hr<p.x+p.w && (bird.y-hr<gapTop || bird.y+hr>gapBot)) onCrash();
      if(!p.scored && p.x+p.w<bird.x){
        p.scored=true; pipesPassed++; addCombo();
        const gained=pts(1); AU.score();
        const near=p.minClear<nearGen && p.minClear>-bird.r;
        if(near){ const nb=pts(2); runNear++; AU.near(); haptic(20);
          ftext(bird.x+18,bird.y-30,L().nearMiss+' +'+(nb+gained),'#34e0ff',24);
          burst(bird.x,bird.y,'#34e0ff',14,260,{life:0.7}); doFlash(0.18,'52,224,255');
          if(runNear===10) unlockAch('near10'); }
        else ftext(p.x+p.w,gapTop+p.gap*0.5,'+'+gained,'#fff',22);
        if(pipesPassed>0 && pipesPassed%10===0 && pipesPassed!==lastMilestone){
          lastMilestone=pipesPassed; AU.milestone(); doFlash(0.25,'255,206,84'); doShake(8);
          ftext(W/2,H*0.3, pipesPassed+' '+L().columns, '#ffce54', 34);
          if(!reducedMotion()) for(let i=0;i<30;i++) burst(rand(0,W),rand(0,H*0.5),choice(['#ffd54a','#ff8d5c','#34e0ff','#b388ff']),1,360,{life:1.1,grav:300});
        }
        checkLiveBest();
        updateHud();
      }
    }
    while(pipes.length && pipes[0].x+pipes[0].w<-20) pipes.shift();

    // hazards
    for(const hz of hazards){ hz.x-=sp*dt; hz.spin+=dt*3.2;
      hz.y=hz.baseY+Math.sin(worldScroll*0.005+hz.ph)*hz.amp;
      if(Math.hypot(bird.x-hz.x,bird.y-hz.y) < bird.r*hitFactor + hz.r*0.82) onCrash();
    }
    hazards=hazards.filter(h=>h.x>-50);

    // coins
    for(const c of coins){
      if(c.got)continue; c.x-=sp*dt; c.spin+=dt*7;
      if(magnetT>0){ const dx=bird.x-c.x,dy=bird.y-c.y,d=Math.hypot(dx,dy); if(d<W*0.26){ c.x+=dx/d*420*dt; c.y+=dy/d*420*dt; } }
      if(Math.hypot(bird.x-c.x,bird.y-c.y)<bird.r+c.r){
        c.got=true; runCoins++; save.coins++; save.stats.totalCoins++; addCombo(); const g=pts(1); AU.coin(); haptic(10);
        coinPersistAcc++; if(coinPersistAcc>=5){ coinPersistAcc=0; persist(); }  // persist periodically mid-run (not only on death)
        if(save.coins>=100) unlockAch('coin100');
        ftext(c.x,c.y-10,'+'+g,'#ffce54',18); burst(c.x,c.y,'#ffd54a',8,200,{life:0.6,grav:300}); updateHud();
      }
    }
    coins=coins.filter(c=>!c.got&&c.x>-40);

    // powers
    for(const pw of powers){ pw.x-=sp*dt; pw.t+=dt;
      if(Math.hypot(bird.x-pw.x,bird.y-pw.y)<bird.r+pw.r){ applyPower(pw.type); burst(pw.x,pw.y,POWER[pw.type].rgb,18,280,{life:0.8}); pw.x=-999; } }
    powers=powers.filter(p=>p.x>-40);

    stepEffects(dt);
    if(bird.y+bird.r*hitFactor>=groundY()){ bird.y=groundY()-bird.r*hitFactor; onCrash(true); }
  }

  function trailPush(){ trail.push({x:bird.x-bird.r*0.4,y:bird.y,a:1}); if(trail.length>14)trail.shift(); for(const t of trail)t.a*=0.86; }
  function stepEffects(dt){
    for(const p of parts){ p.vy+=p.grav*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; } parts=parts.filter(p=>p.life>0);
    for(const t of texts){ t.y+=t.vy*dt; t.vy*=0.92; t.life-=dt; } texts=texts.filter(t=>t.life>0);
  }

  const POWER={ shield:{icon:'🛡️',rgb:'52,224,255'}, magnet:{icon:'🧲',rgb:'255,93,143'}, slow:{icon:'⏱️',rgb:'179,136,255'}, double:{icon:'✦',rgb:'255,210,74'} };
  function applyPower(type){
    usedPowerup=true; AU.power(); doFlash(0.22,POWER[type].rgb); doShake(4); haptic(15);
    ftext(bird.x,bird.y-bird.r-30, L().pw[type]+'!', 'rgb('+POWER[type].rgb+')', 26);
    if(type==='shield')shield=true; else if(type==='magnet')magnetT=7; else if(type==='slow')slowT=4.5; else if(type==='double')dblT=8;
  }
  function onCrash(ground){
    if(state!=='play')return; if(invul>0)return;
    if(shield&&!ground){ shield=false; invul=1.0; AU.shieldBreak(); doFlash(0.3,'52,224,255'); doShake(10);
      bird.vy=-Math.max(300,H*0.4); burst(bird.x,bird.y,'#34e0ff',26,360,{life:0.9}); ftext(bird.x,bird.y-bird.r-28,L().shieldBreak,'#34e0ff',26); return; }
    die();
  }
  function die(){
    state='dead'; deadT=0; hitStop=0.07; AU.hit(); doShake(16); doFlash(0.5,'255,80,80'); haptic([40,30,60]);
    burst(bird.x,bird.y,skinById(save.selected).body,30,360,{life:1.0}); burst(bird.x,bird.y,'#fff',14,220,{life:0.7});
    if(score>save.best){ save.best=score; bird._newbest=true; } else bird._newbest=false;
    recordRun();
    persist();
  }
  // ----- post-run bookkeeping: stats, achievements, daily, history -----
  function recordRun(){
    const st=save.stats;
    st.games++; if(score>st.bestScore)st.bestScore=score; if(runMaxCombo>st.bestCombo)st.bestCombo=runMaxCombo;
    st.nearTotal=(st.nearTotal||0)+runNear;
    save.history.unshift({ d:Date.now(), s:score, c:runCoins, mc:runMaxCombo, dl:dailyMode?1:0 });
    if(save.history.length>10) save.history.length=10;
    // achievements
    if(!usedPowerup && score>=30) unlockAch('noPower');
    if(score>=50) unlockAch('score50');
    if(score>=100) unlockAch('legend');
    if(SKINS.every(isOwned)) unlockAch('allSkins');
    // daily challenge result + streak
    if(dailyMode){
      const tk=todayKey();
      if(save.dailyDate!==tk){ save.dailyDate=tk; save.dailyBest=0; }
      if(score>save.dailyBest) save.dailyBest=score;
      if(score>0){
        const y=new Date(); y.setDate(y.getDate()-1);
        const yk=''+y.getFullYear()+String(y.getMonth()+1).padStart(2,'0')+String(y.getDate()).padStart(2,'0');
        if(save.dailyLastWin!==tk){
          save.dailyStreak = (save.dailyLastWin===yk) ? (save.dailyStreak||0)+1 : 1;
          save.dailyLastWin=tk;
        }
        if((save.dailyStreak||0)>=3) unlockAch('daily3');
      }
    }
  }
  function deadFall(dt){
    if(hitStop>0){hitStop-=dt;return;}
    const G=Math.max(1400,H*2.5); bird.vy+=G*dt; bird.y+=bird.vy*dt; bird.rot=Math.min(1.6,bird.rot+dt*4);
    if(bird.y+bird.r*hitFactor>=groundY()){ if(bird.vy>140){bird.vy*=-0.4;doShake(5);burst(bird.x,groundY(),'#caa05a',8,160,{life:0.5,grav:500});} else bird.vy=0; bird.y=groundY()-bird.r*hitFactor; }
    stepEffects(dt); deadT+=dt;
    if(deadT>0.7 && !$('over').classList.contains('show')) showGameOver();
  }

  // ===================== Render =====================
  function skyAt(tod){
    const stops=[{t:0,a:'#0b1026',b:'#39305c'},{t:0.16,a:'#26407a',b:'#c9708f'},{t:0.30,a:'#5aa6ec',b:'#cdeaff'},
      {t:0.55,a:'#4a93d6',b:'#bfe6ff'},{t:0.72,a:'#e58a5c',b:'#ffd9a0'},{t:0.86,a:'#3c2c60',b:'#b06a8a'},{t:1,a:'#0b1026',b:'#39305c'}];
    let i=0; for(;i<stops.length-1;i++){ if(tod>=stops[i].t&&tod<=stops[i+1].t)break; }
    const s0=stops[i],s1=stops[Math.min(i+1,stops.length-1)],tt=(tod-s0.t)/Math.max(0.0001,(s1.t-s0.t));
    return {a:mix(s0.a,s1.a,tt),b:mix(s0.b,s1.b,tt)};
  }
  function nightAmount(){ const d=Math.min(Math.abs(tod-0),Math.abs(tod-1)); return clamp(1-d/0.22,0,1); }

  function render(){
    ctx.save(); if(shake>0.2) ctx.translate(rand(-shake,shake),rand(-shake,shake));
    const sky=skyAt(tod); const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,sky.a); g.addColorStop(1,sky.b);
    ctx.fillStyle=g; ctx.fillRect(-20,-20,W+40,H+40);
    const na=nightAmount();
    if(na>0.01){ for(const s of stars){ const tw=0.5+0.5*Math.sin(s.tw); ctx.globalAlpha=na*tw*0.9; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,6.28); ctx.fill(); } ctx.globalAlpha=1; }
    const ca=(tod*6.28-1.57), cx=W*0.5+Math.cos(ca)*W*0.42, cy=H*0.62+Math.sin(ca)*H*0.5;
    if(cy<GROUND+40){ ctx.save(); const isMoon=na>0.4; ctx.shadowBlur=40; ctx.shadowColor=isMoon?'rgba(220,230,255,.7)':'rgba(255,220,120,.8)';
      ctx.fillStyle=isMoon?'#eef2ff':'#fff2b0'; ctx.beginPath(); ctx.arc(cx,cy,Math.max(20,H*0.045),0,6.28); ctx.fill(); ctx.restore(); }
    drawHills(H*0.74, mix('#2a6e52','#243a6b',na), worldScroll*0.10);
    drawHills(H*0.80, mix('#225c46','#1b2c54',na), worldScroll*0.18);
    for(const c of clouds) drawCloud(c.x,c.y,c.s,'rgba(255,255,255,'+(0.75-na*0.5)+')');
    for(const p of pipes) drawPipe(p);
    for(const hz of hazards) drawHazard(hz);
    for(const c of coins){ if(!c.got) drawCoin(c); }
    for(const pw of powers) drawPower(pw);
    drawGround();
    const sk=skinById(save.skin);
    for(const t of trail){ ctx.globalAlpha=t.a*0.5; ctx.fillStyle=sk.trail; ctx.beginPath(); ctx.arc(t.x,t.y,bird.r*0.7*t.a,0,6.28); ctx.fill(); } ctx.globalAlpha=1;
    if(bird){ paintBird(ctx,bird.x,bird.y,bird.r,sk,{rot:bird.rot,wing:bird.wing,vy:bird.vy,shield:shield,invul:invul,now:performance.now()});
      if(sk.fire) for(let i=0;i<2;i++) burst(bird.x-bird.r*1.2,bird.y,'rgba(255,140,40,.5)',1,40,{life:0.3,grav:-60,r:3});
      if(sk.spark && state==='play') burst(bird.x-bird.r,bird.y,choice(['rgba(180,140,255,.7)','rgba(120,224,255,.7)']),1,40,{life:0.4,grav:-30,r:2}); }
    for(const p of parts){ ctx.globalAlpha=clamp(p.life/p.max,0,1); ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.28); ctx.fill(); } ctx.globalAlpha=1;
    drawPills();
    for(const t of texts){ ctx.globalAlpha=clamp(t.life/t.max,0,1); ctx.font='900 '+t.size+'px Segoe UI, system-ui, sans-serif'; ctx.textAlign='center';
      ctx.lineWidth=4; ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.strokeText(t.t,t.x,t.y); ctx.fillStyle=t.col; ctx.fillText(t.t,t.x,t.y); }
    ctx.globalAlpha=1; ctx.textAlign='left';
    ctx.restore();
    if(flash>0.01){ ctx.fillStyle='rgba('+flashCol+','+(flash*0.5)+')'; ctx.fillRect(0,0,W,H); }
    const vg=ctx.createRadialGradient(W/2,H/2,Math.min(W,H)*0.35,W/2,H/2,Math.max(W,H)*0.72);
    vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.28)'); ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
  }

  function drawHills(baseY,col,off){ const h=hills[0]; if(!h)return; ctx.fillStyle=col; ctx.beginPath(); ctx.moveTo(0,H);
    const seg=h.pts.length-1,w=W/seg,o=off%w;
    for(let i=0;i<=seg+1;i++){ ctx.lineTo(i*w-o, baseY-h.pts[i%h.pts.length]*H*0.10); }
    ctx.lineTo(W,H); ctx.closePath(); ctx.fill(); }
  function drawCloud(x,y,s,col){ ctx.fillStyle=col; ctx.beginPath(); ctx.arc(x,y,22*s,0,6.28); ctx.arc(x+24*s,y+6*s,18*s,0,6.28); ctx.arc(x-24*s,y+6*s,16*s,0,6.28); ctx.arc(x,y+12*s,20*s,0,6.28); ctx.fill(); }

  function drawPipe(p){
    const gapTop=p.gy-p.gap/2, gapBot=p.gy+p.gap/2, lip=Math.min(18,p.w*0.28), capH=Math.max(20,H*0.03);
    const grad=ctx.createLinearGradient(p.x,0,p.x+p.w,0);
    if(p.narrow){ grad.addColorStop(0,'#c0563a'); grad.addColorStop(0.5,'#ef8a6a'); grad.addColorStop(0.55,'#ffb08c'); grad.addColorStop(1,'#9c3f2c'); }
    else { grad.addColorStop(0,'#3aa54f'); grad.addColorStop(0.5,'#74d86a'); grad.addColorStop(0.55,'#9bef8c'); grad.addColorStop(1,'#2c8a44'); }
    ctx.fillStyle=grad;
    rr(ctx,p.x,0,p.w,gapTop,8); ctx.fill(); rr(ctx,p.x-lip,gapTop-capH,p.w+2*lip,capH,7); ctx.fill();
    rr(ctx,p.x,gapBot,p.w,GROUND-gapBot,8); ctx.fill(); rr(ctx,p.x-lip,gapBot,p.w+2*lip,capH,7); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.14)'; ctx.fillRect(p.x+p.w-6,0,6,gapTop); ctx.fillRect(p.x+p.w-6,gapBot,6,GROUND-gapBot);
    ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(p.x+5,0,4,gapTop); ctx.fillRect(p.x+5,gapBot,4,GROUND-gapBot);
  }
  function drawHazard(hz){
    ctx.save(); ctx.translate(hz.x,hz.y); ctx.rotate(hz.spin); const r=hz.r,sp=8;
    ctx.beginPath(); for(let i=0;i<sp*2;i++){ const ang=Math.PI*i/sp, rr2=(i%2===0)?r:r*0.6; if(i)ctx.lineTo(Math.cos(ang)*rr2,Math.sin(ang)*rr2); else ctx.moveTo(Math.cos(ang)*rr2,Math.sin(ang)*rr2); }
    ctx.closePath(); const gg=ctx.createRadialGradient(0,0,2,0,0,r); gg.addColorStop(0,'#ff9a9a'); gg.addColorStop(1,'#c8324a'); ctx.fillStyle=gg; ctx.fill();
    ctx.fillStyle='#7a1226'; ctx.beginPath(); ctx.arc(0,0,r*0.34,0,6.28); ctx.fill();
    ctx.fillStyle='#ffd2d2'; ctx.beginPath(); ctx.arc(-r*0.12,-r*0.12,r*0.10,0,6.28); ctx.fill();
    ctx.restore();
  }
  function drawCoin(c){
    const sx=Math.abs(Math.cos(c.spin)); ctx.save(); ctx.translate(c.x,c.y); ctx.scale(Math.max(0.12,sx),1);
    const gg=ctx.createRadialGradient(-c.r*0.3,-c.r*0.3,1,0,0,c.r); gg.addColorStop(0,'#fff3b0'); gg.addColorStop(0.6,'#ffce54'); gg.addColorStop(1,'#e0922a');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,c.r,0,6.28); ctx.fill(); ctx.strokeStyle='#b5701c'; ctx.lineWidth=Math.max(1.5,c.r*0.16); ctx.stroke(); ctx.restore();
    if(sx>0.4){ ctx.fillStyle='rgba(180,110,20,.9)'; ctx.font='900 '+(c.r*1.2)+'px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('★',c.x,c.y+1); ctx.textBaseline='alphabetic'; ctx.textAlign='left'; }
  }
  function drawPower(pw){
    const P=POWER[pw.type], pulse=1+Math.sin(pw.t*6)*0.06; ctx.save(); ctx.translate(pw.x,pw.y); ctx.scale(pulse,pulse);
    ctx.shadowBlur=22; ctx.shadowColor='rgb('+P.rgb+')'; const gg=ctx.createRadialGradient(0,0,2,0,0,pw.r); gg.addColorStop(0,'#fff'); gg.addColorStop(1,'rgb('+P.rgb+')');
    ctx.fillStyle=gg; ctx.beginPath(); ctx.arc(0,0,pw.r,0,6.28); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#fff'; ctx.font='900 '+(pw.r*1.1)+'px Segoe UI'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(P.icon,0,1); ctx.textBaseline='alphabetic'; ctx.textAlign='left'; ctx.restore();
  }
  function drawGround(){
    const gd=ctx.createLinearGradient(0,GROUND,0,H); gd.addColorStop(0,'#caa05a'); gd.addColorStop(0.12,'#b98e49'); gd.addColorStop(1,'#8a6533');
    ctx.fillStyle=gd; ctx.fillRect(0,GROUND,W,GROUND_H);
    ctx.fillStyle='#7cc15a'; ctx.fillRect(0,GROUND,W,Math.max(8,GROUND_H*0.16));
    ctx.fillStyle='#69ad4a'; const tw=26,o=worldScroll%tw;
    for(let x=-tw;x<W+tw;x+=tw){ ctx.beginPath(); ctx.moveTo(x-o,GROUND); ctx.lineTo(x-o+tw/2,GROUND-6); ctx.lineTo(x-o+tw,GROUND); ctx.closePath(); ctx.fill(); }
    ctx.strokeStyle='rgba(0,0,0,.10)'; ctx.lineWidth=2; const dw=40,d2=worldScroll%dw;
    for(let x=-dw;x<W+dw;x+=dw){ ctx.beginPath(); ctx.moveTo(x-d2,GROUND+GROUND_H*0.5); ctx.lineTo(x-d2+18,GROUND+GROUND_H*0.5); ctx.stroke(); }
  }

  // shared bird painter (used in-game AND in menu preview)
  function paintBird(g,cx,cy,r,sk,o){ o=o||{}; const now=o.now||0;
    g.save(); g.translate(cx,cy); if(o.rot)g.rotate(o.rot);
    if(o.invul>0 && Math.floor(now/80)%2===0) g.globalAlpha=0.45;
    const st=clamp(1+(o.vy||0)/(H*3||3000),0.82,1.18); g.scale(1/Math.sqrt(st),st);
    if(o.shield){ g.save(); g.globalAlpha=0.5+0.2*Math.sin(now/120); g.strokeStyle='#34e0ff'; g.lineWidth=3; g.shadowBlur=14; g.shadowColor='#34e0ff'; g.beginPath(); g.arc(0,0,r*1.7,0,6.28); g.stroke(); g.restore(); }
    const bg=g.createRadialGradient(-r*0.3,-r*0.3,2,0,0,r*1.15); bg.addColorStop(0,mix(sk.body,'#ffffff',0.25)); bg.addColorStop(1,sk.body);
    g.fillStyle=bg; g.beginPath(); g.ellipse(0,0,r*1.12,r,0,0,6.28); g.fill();
    g.fillStyle=sk.belly; g.beginPath(); g.ellipse(r*0.05,r*0.34,r*0.78,r*0.6,0,0,6.28); g.fill();
    const wa=-0.5-(o.wing||0)*1.1+Math.sin(now/110)*0.12;
    g.save(); g.translate(-r*0.15,-r*0.05); g.rotate(wa);
    g.fillStyle=sk.wing; g.beginPath(); g.ellipse(0,0,r*0.7,r*0.42,0,0,6.28); g.fill();
    g.fillStyle='rgba(255,255,255,.18)'; g.beginPath(); g.ellipse(-r*0.1,-r*0.08,r*0.4,r*0.22,0,0,6.28); g.fill(); g.restore();
    g.fillStyle='#fff'; g.beginPath(); g.arc(r*0.45,-r*0.28,r*0.34,0,6.28); g.fill();
    g.fillStyle='#15202e'; g.beginPath(); g.arc(r*0.55,-r*0.28,r*0.17,0,6.28); g.fill();
    g.fillStyle='#fff'; g.beginPath(); g.arc(r*0.6,-r*0.34,r*0.06,0,6.28); g.fill();
    g.fillStyle=sk.beak; g.beginPath(); g.moveTo(r*0.95,-r*0.05); g.lineTo(r*1.5,r*0.06); g.lineTo(r*0.95,r*0.2); g.closePath(); g.fill();
    g.restore();
  }

  function drawPills(){
    const act=[]; if(shield)act.push(['🛡️',1,'52,224,255']); if(magnetT>0)act.push(['🧲',magnetT/7,'255,93,143']);
    if(slowT>0)act.push(['⏱️',slowT/4.5,'179,136,255']); if(dblT>0)act.push(['✦',dblT/8,'255,210,74']); if(combo>=4)act.push(['🔥x'+mult,comboT/2.4,'255,140,60']);
    if(!act.length)return; let x=W/2-act.length*44+44,y=H*0.16; ctx.textAlign='center'; ctx.textBaseline='middle';
    for(const [ic,frac,rgb] of act){ ctx.fillStyle='rgba(8,12,30,.5)'; rr(ctx,x-38,y-15,76,30,15); ctx.fill();
      ctx.fillStyle='rgb('+rgb+')'; rr(ctx,x-38,y+11,76*clamp(frac,0,1),4,2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='900 16px Segoe UI'; ctx.fillText(ic,x,y-1); x+=88; }
    ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  }

  // ===================== HUD / panels =====================
  function updateHud(){ $('scoreBig').textContent=score; $('coinVal').textContent=runCoins; $('bestVal').textContent=Math.max(save.best,score); }
  function showHud(on){ $('coinHud').classList.toggle('show',on); $('bestHud').classList.toggle('show',on); $('pauseBtn').classList.toggle('show',on); $('muteBtn').classList.toggle('show',on); }

  function startGame(){
    AU.ensure(); $('menu').classList.remove('show'); $('over').classList.remove('show'); $('pause').classList.remove('show');
    closeOverlay('settings'); closeOverlay('statsView'); closeOverlay('achView');

  function medalFor(s){
    if(s>=100)return{icon:'🌈',key:'legend'}; if(s>=70)return{icon:'💎',key:'plat'}; if(s>=45)return{icon:'🥇',key:'gold'};
    if(s>=25)return{icon:'🥈',key:'silver'}; if(s>=10)return{icon:'🥉',key:'bronze'}; return{icon:'🐤',key:'rookie'};
  }
  // pause: persist on enter; resume runs a 3-2-1 countdown so you never resume straight into a pipe

    else if(state==='pause'){ $('pause').classList.remove('show'); resumeCount++; beginCountdown(); }
  }

  // skins UI — real economy: select (owned) vs buy (deduct coins) vs locked (insufficient)
  function buildSkinUI(){
    const list=$('skinList'); list.innerHTML=''; const Lc=L();
    for(const s of SKINS){
      const el=document.createElement('button'); el.type='button'; el.className='skin';
      const owned=isOwned(s), sel=(save.selected===s.id);
      if(sel) el.classList.add('sel');
      if(!owned) el.classList.add('locked');
      // color-blind-safe: text/emoji cue ✓ (selected), 🔒 (locked) — not color alone
      let badge='';
      if(sel) badge='<div class="lock">✓</div>';
      else if(!owned) badge='<div class="lock">🔒</div><div class="price">'+s.price+'🪙</div>';
      el.innerHTML=swatch(s)+badge;
      el.title=skinName(s)+(owned?(sel?' — '+Lc.selected:' — '+Lc.select):' — '+Lc.buy+' '+s.price+' '+Lc.coinsUnit);
      el.setAttribute('aria-label', el.title);
      el.onclick=()=>{
        if(owned){ if(!sel){ save.selected=s.id; persist(); buildSkinUI(); updateSkinLabels(); previewPulse=1; } return; }
        // not owned: attempt purchase
        if(canAfford(s)){
          save.coins-=s.price; save.owned.push(s.id); save.selected=s.id; persist();
          AU.power(); previewPulse=1; showToast('✨', Lc.bought+' '+skinName(s));
          buildSkinUI(); updateSkinLabels(); refreshMenuStats();
          if(SKINS.every(isOwned)) unlockAch('allSkins');
        } else {
          showToast('🪙', Lc.notEnough);
          el.animate([{transform:'translateX(-4px)'},{transform:'translateX(4px)'},{transform:'translateX(0)'}],{duration:200});
        }
      };
      list.appendChild(el);
    }
  }

    +'<ellipse cx="17" cy="22" rx="8" ry="6.5" fill="'+s.belly+'"/>'
    +'<ellipse cx="12" cy="17" rx="6" ry="3.6" fill="'+s.wing+'" transform="rotate(-20 12 17)"/>'
    +'<circle cx="22" cy="14" r="3.6" fill="#fff"/><circle cx="23" cy="14" r="1.8" fill="#15202e"/>'
    +'<polygon points="27,16 33,18 27,20" fill="'+s.beak+'"/></svg>'; }

  // ===================== Achievements panel =====================
  function openAch(){
    const grid=$('achGrid'); grid.innerHTML=''; const Lc=L(); let got=0;
    for(const a of ACH){
      const have=!!save.ach[a.id]; if(have)got++;
      const el=document.createElement('div'); el.className='ach'+(have?' got':' locked');
      el.innerHTML='<div class="aic">'+(have?a.ic:'🔒')+'</div><div class="anm">'+(Lc.ach[a.id]||a.id)+'</div>';
      el.title=(Lc.ach[a.id]||a.id)+' — '+(Lc.ach[a.id+'d']||'');
      grid.appendChild(el);
    }
    $('achProgress').textContent=got+' / '+ACH.length+' '+Lc.achDone;
    openOverlay('achView');
  }

  // ===================== Daily challenge =====================
  function updateDailyInfo(){
    const tk=todayKey(); const Lc=L();
    const todayBest = (save.dailyDate===tk) ? save.dailyBest : 0;
    $('dailyInfo').innerHTML = Lc.dailyToday+': <b>'+(todayBest||Lc.dailyNone)+'</b> · '+Lc.dailyStreak+': <b>'+(save.dailyStreak||0)+'</b>';
  }
  function startDaily(){ dailyMode=true; startGame(); }

  // ===================== Share result =====================
  function shareResult(){
    const Lc=L(); const M=medalFor(score);
    const lines=[
      'FLAPPY 100× '+M.icon,
      (dailyMode?'🗓️ '+todayKey()+'  ':'')+Lc.score+': '+score+(bird&&bird._newbest?' '+Lc.newBest:''),
      '🪙 '+runCoins+'   🔥 x'+runMaxCombo+'   🎯 '+runNear
    ];
    const txt=lines.join('\n');
    const done=()=>{ const b=$('shareBtn'); const old=b.textContent; b.textContent=Lc.copied; setTimeout(()=>{ b.textContent=old; },1600); };
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(done,()=>fallbackCopy(txt,done)); }
    else fallbackCopy(txt,done);
  }
  function fallbackCopy(txt,cb){ try{ const ta=document.createElement('textarea'); ta.value=txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); cb&&cb(); }catch(e){} }

  function applyLang(){
    const Lc=L(); document.documentElement.lang=save.lang;
    $('mSub').textContent=Lc.sub; $('mTagline').textContent=Lc.tagline;
    $('mBestLbl').textContent=Lc.best; $('mCoinsLbl').textContent=Lc.totalCoins;
    $('playBtn').textContent=Lc.play; $('chooseLbl').textContent=Lc.chooseBird; $('mHint').innerHTML=Lc.hint;
    $('diffLbl').textContent=Lc.diffLbl;
    $('tapHint').textContent=Lc.tap; $('pauseTtl').textContent=Lc.pause; $('pauseSub').textContent=Lc.pauseSub;
    $('resumeBtn').textContent=Lc.resume; $('pMenuBtn').textContent=Lc.menu; $('pRestartBtn').textContent=Lc.restart;
    $('oScoreLbl').textContent=Lc.score; $('oBestLbl').textContent=Lc.best; $('oCoinsLbl').textContent=Lc.coinsGot;
    $('newBest').textContent=Lc.newBest; $('againBtn').textContent=Lc.playAgain; $('menuBtn').textContent=Lc.toMenu;
    // new UI strings
    $('dailyBtn').textContent=Lc.daily;
    $('statsBtn').textContent=Lc.stats; $('achBtn').textContent=Lc.achievements; $('settingsBtn').textContent=Lc.settings;
    $('pSettingsBtn').textContent=Lc.settings; $('shareBtn').textContent=Lc.share;
    $('pwLegend').innerHTML=Lc.pwLegend;
    // settings panel
    $('setTtl').textContent=Lc.settingsTtl; $('setVolLbl').innerHTML='🔊 '+Lc.vol; $('setSfxLbl').innerHTML='🔉 '+Lc.sfx;
    $('setMusLbl').innerHTML='🎵 '+Lc.music; $('setMotionLbl').innerHTML='🌀 '+Lc.reduceMotion;
    $('setThemeLbl').textContent=Lc.theme; $('setCloseBtn').textContent=Lc.close;
    // stats panel
    $('statsTtl').textContent=Lc.statsTtl; $('stGamesLbl').textContent=Lc.games; $('stBestLbl').textContent=Lc.bestScore;
    $('stComboLbl').textContent=Lc.bestCombo; $('stCoinsLbl').textContent=Lc.totalCoinsS;
    $('stNearLbl').textContent=Lc.nearTotal; $('stStreakLbl').textContent=Lc.streak;
    $('histLbl').textContent=Lc.history; $('statsCloseBtn').textContent=Lc.close;
    // achievements panel
    $('achTtl').textContent=Lc.achTtl; $('achCloseBtn').textContent=Lc.close;
    document.querySelectorAll('.langbtn').forEach(b=>b.classList.toggle('sel',b.dataset.lang===save.lang));
    buildSkinUI(); updateSkinLabels(); buildDiffUI(); buildThemeUI(); updateDailyInfo();
  }

  // buttons
  $('playBtn').onclick=()=>{ dailyMode=false; startGame(); };
  $('againBtn').onclick=()=>{ startGame(); };   // keep current mode (daily replays daily)
  $('dailyBtn').onclick=startDaily;
  $('menuBtn').onclick=()=>{ $('over').classList.remove('show'); $('menu').classList.add('show'); state='menu'; dailyMode=false; refreshMenuStats(); updateDailyInfo(); };
  $('resumeBtn').onclick=togglePause; $('pauseBtn').onclick=togglePause; $('muteBtn').onclick=toggleMute;
  $('pMenuBtn').onclick=()=>{ $('pause').classList.remove('show'); $('menu').classList.add('show'); state='menu'; dailyMode=false; showHud(false); refreshMenuStats(); updateDailyInfo(); };
  $('pRestartBtn').onclick=()=>{ startGame(); };
  document.querySelectorAll('.langbtn').forEach(b=> b.onclick=()=>{ save.lang=b.dataset.lang; persist(); applyLang(); });
  document.querySelectorAll('.diffbtn').forEach(b=> b.onclick=()=>{ save.diff=b.dataset.diff; persist(); buildDiffUI(); });
  document.addEventListener('visibilitychange',()=>{ if(document.hidden&&state==='play') togglePause(); else if(document.hidden) persist(); });
  window.addEventListener('blur', ()=>{ persist(); });   // economy: persist coins on blur too

  // menu nav buttons
  $('statsBtn').onclick=openStats; $('achBtn').onclick=openAch; $('settingsBtn').onclick=openSettings;
  $('shareBtn').onclick=shareResult;
  $('statsCloseBtn').onclick=()=>closeOverlay('statsView');
  $('achCloseBtn').onclick=()=>closeOverlay('achView');
  $('pSettingsBtn').onclick=openSettings;
  $('setCloseBtn').onclick=()=>closeOverlay('settings');

  // settings controls
  $('setVol').oninput=()=>{ save.vol=(+$('setVol').value)/100; AU.syncVol(); persist(); };
  $('setVol').onchange=()=>{ AU.ensure(); AU.tone(700,900,.08,'triangle',.16); };  // preview blip
  $('setSfx').onclick=()=>{ save.sfx=!(save.sfx!==false); $('setSfx').setAttribute('aria-checked', save.sfx?'true':'false'); persist(); if(save.sfx){ AU.ensure(); AU.coin(); } };
  $('setMus').onclick=()=>{ save.music=!(save.music===true); $('setMus').setAttribute('aria-checked', save.music?'true':'false'); persist(); AU.setMusic(save.music); };
  $('setMotion').onclick=()=>{ const on=!reducedMotion(); save.reduceMotion=on; $('setMotion').setAttribute('aria-checked', on?'true':'false'); persist(); };

  // ===================== Skin preview =====================
  const pv=$('skinPrev'), pvx=pv.getContext('2d'); let previewPulse=0;
  function drawPreview(now){
    const cw=pv.clientWidth||128, ch=pv.clientHeight||80;
    if(pv.width!==Math.floor(cw*DPR)){ pv.width=Math.floor(cw*DPR); pv.height=Math.floor(ch*DPR); }
    pvx.setTransform(DPR,0,0,DPR,0,0); pvx.clearRect(0,0,cw,ch);
    const sk=skinById(save.skin); const base=Math.min(cw,ch)*0.30; const pulse=1+previewPulse*0.18; previewPulse*=0.88;
    const r=base*pulse; const bob=Math.sin(now/380)*ch*0.07;
    if(sk.fire) for(let i=0;i<1;i++){ pvx.globalAlpha=0.5; pvx.fillStyle='rgba(255,150,60,.6)'; pvx.beginPath(); pvx.arc(cw/2-r*1.2,ch/2+bob,r*0.35,0,6.28); pvx.fill(); pvx.globalAlpha=1; }
    paintBird(pvx, cw/2, ch/2+bob, r, sk, {wing:0.3+0.4*Math.abs(Math.sin(now/150)), now});
  }

  // ===================== Boot =====================
  resize(); buildBackdrop(); applyLang(); refreshMenuStats();
  $('muteBtn').textContent=save.muted?'🔇':'🔊';
  bird={ x:W*0.30, y:H*0.46, vy:0, rot:0, r:Math.max(13,H*0.026), flap:0, wing:0 };

  let last=performance.now();
  function frame(now){
    let dt=(now-last)/1000; last=now; if(dt>1/30)dt=1/30;
    if(state==='menu'){ tod=(tod+dt*0.012)%1; bird.y=H*0.46+Math.sin(now/420)*12; bird.wing*=0.92;
      for(const c of clouds){ c.x-=c.sp*dt*0.5; if(c.x<-120){c.x=W+rand(20,120);c.y=rand(H*0.06,H*0.42);} }
      for(const s of stars)s.tw+=dt*2; stepEffects(dt); render(); drawPreview(now); }
    else { update(dt); render(); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
