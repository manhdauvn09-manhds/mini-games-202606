<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0b1020"/>
<title>🧪 Water Sort Puzzle ✦ 100×</title>
<style>
:root{--bg0:#0b1020;--bg1:#0e1428;--gold:#ffce54;--cyan:#34e0ff;--violet:#b388ff;--teal:#34d3b6;--rose:#ff6b9d;--ink:#eaf0ff;--ink-dim:#9fb0d4;--glass:rgba(255,255,255,.06);--glass-brd:rgba(255,255,255,.12);--shadow:0 18px 50px rgba(0,0,0,.5);}
html[data-theme="light"]{--bg0:#eef2fb;--bg1:#dde4f3;--ink:#1a2236;--ink-dim:#55617d;--glass:rgba(20,30,60,.05);--glass-brd:rgba(20,30,60,.14);}
html[data-theme="sunset"]{--bg0:#1a0d18;--bg1:#2a0f1e;--gold:#ffd36b;--cyan:#ff9e64;--violet:#ff6b9d;--teal:#ffb86b;--rose:#ff5c8a;--ink:#fff0ea;--ink-dim:#e0b3b8;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;margin:0;overflow:hidden}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;color:var(--ink);background:radial-gradient(1200px 700px at 12% -10%,rgba(52,224,255,.08),transparent 55%),radial-gradient(1000px 680px at 110% 0%,rgba(179,136,255,.10),transparent 52%),radial-gradient(900px 700px at 50% 120%,rgba(255,206,84,.06),transparent 55%),linear-gradient(160deg,var(--bg0),var(--bg1));background-attachment:fixed;display:flex;flex-direction:column;align-items:center;padding:max(8px,env(safe-area-inset-top)) max(8px,env(safe-area-inset-right)) max(8px,env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));user-select:none;-webkit-user-select:none;touch-action:none;}
.wrap{width:100%;max-width:500px;display:flex;flex-direction:column;gap:10px;flex:1 0 auto;}
header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;background:var(--glass);border:1px solid var(--glass-brd);border-radius:16px;padding:10px 14px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:var(--shadow);}
.brand{display:flex;align-items:baseline;gap:6px;margin-right:auto;min-width:0}
.brand h1{font-size:clamp(22px,6vw,34px);margin:0;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--teal),var(--cyan) 55%,var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;}
.brand small{font-size:10px;color:var(--ink-dim);letter-spacing:2px;font-weight:700}
.scores{display:flex;gap:8px}
.score-box{min-width:72px;text-align:center;background:linear-gradient(180deg,rgba(255,255,255,.08),rgba(255,255,255,.03));border:1px solid var(--glass-brd);border-radius:10px;padding:5px 10px 6px;overflow:hidden}
.score-box .lbl{font-size:9px;letter-spacing:1.2px;color:var(--ink-dim);font-weight:800;text-transform:uppercase}
.score-box .val{font-size:clamp(16px,4vw,20px);font-weight:800;line-height:1.1;font-variant-numeric:tabular-nums}
#score-box .val{color:var(--gold)}#best-box .val{color:var(--cyan)}
.score-box.bump{animation:bump .28s ease}
@keyframes bump{0%{transform:scale(1)}40%{transform:scale(1.13)}100%{transform:scale(1)}}
.btn{appearance:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13px;color:var(--ink);padding:8px 12px;border-radius:10px;min-height:40px;border:1px solid var(--glass-brd);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));transition:transform .08s,border-color .18s;display:inline-flex;align-items:center;justify-content:center;gap:6px;touch-action:manipulation;}
.btn:hover{border-color:rgba(255,255,255,.28)}
.btn:active{transform:translateY(1px) scale(.97)}
.btn.primary{color:#1a1205;border-color:transparent;background:linear-gradient(135deg,var(--gold),#ffd778);box-shadow:0 6px 18px rgba(255,206,84,.30);}
.icon-btn{padding:8px 10px;min-width:40px}
.langbtn{appearance:none;cursor:pointer;font-family:inherit;font-weight:800;font-size:12px;color:var(--ink);padding:6px 10px;border-radius:999px;min-height:38px;border:1px solid var(--glass-brd);background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));touch-action:manipulation;}
.langbtn.active{color:#1a1205;border-color:transparent;background:linear-gradient(135deg,var(--gold),#ffd778);box-shadow:0 6px 16px rgba(255,206,84,.30);}
.game-area{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}
#gameCanvas{display:block;max-width:100%;max-height:100%;background:var(--glass);border:1px solid var(--glass-brd);border-radius:18px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.06);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);touch-action:none;}
.info-bar{display:flex;align-items:center;gap:10px;justify-content:center;flex-wrap:wrap;padding:4px 0}
.info-bar .puzzle-name{font-size:14px;font-weight:700;color:var(--ink-dim)}
.info-bar .mistakes{font-size:12px;color:var(--rose)}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;padding:22px;border-radius:18px;z-index:10;background:radial-gradient(120% 120% at 50% 30%,rgba(11,16,32,.78),rgba(11,16,32,.92));backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .28s;}
.overlay.show{opacity:1;pointer-events:auto;animation:ovin .35s ease}
@keyframes ovin{from{transform:scale(.97)}to{transform:scale(1)}}
.overlay .big{font-size:clamp(26px,7vw,44px);font-weight:900;margin:0;line-height:1.05;background:linear-gradient(135deg,var(--gold),var(--rose),var(--violet));-webkit-background-clip:text;background-clip:text;color:transparent;}
.overlay .sub{color:var(--ink-dim);font-size:14px;margin:0;max-width:300px}
.overlay .ov-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.overlay .ov-stats{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;font-size:12px;color:var(--ink-dim)}
.overlay .ov-stats b{color:var(--ink);display:block;font-size:16px}
.toast{position:absolute;left:50%;bottom:12px;transform:translateX(-50%) translateY(12px);background:rgba(20,26,46,.92);border:1px solid var(--glass-brd);color:var(--ink);padding:8px 14px;border-radius:999px;font-size:12px;font-weight:700;z-index:11;opacity:0;pointer-events:none;box-shadow:0 10px 28px rgba(0,0,0,.5);white-space:nowrap;max-width:90%;}
.toast.show{animation:toast 1.25s ease forwards}
@keyframes toast{0%{opacity:0;transform:translateX(-50%) translateY(12px)}15%,75%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}
.modal-back{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(5,8,18,.62);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-back.show{opacity:1;pointer-events:auto}
.modal{width:100%;max-width:400px;max-height:85dvh;overflow-y:auto;background:linear-gradient(180deg,var(--bg1),var(--bg0));border:1px solid var(--glass-brd);border-radius:18px;box-shadow:var(--shadow);padding:16px 16px 18px;transform:translateY(8px) scale(.98);transition:transform .2s;}
.modal-back.show .modal{transform:translateY(0) scale(1)}
.modal h2{font-size:18px;margin:0 0 12px;display:flex;align-items:center;gap:8px}
.modal .close-btn{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--ink-dim);font-size:22px;cursor:pointer;padding:4px;line-height:1}
.setting-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.setting-row .sl{font-size:13px;color:var(--ink-dim);min-width:70px}
.tgl{position:relative;width:44px;height:24px;background:rgba(255,255,255,.15);border-radius:999px;cursor:pointer;transition:background .2s;flex-shrink:0}
.tgl.on{background:var(--gold)}
.tgl::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.tgl.on::after{transform:translateX(20px)}
.langrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
</style>
</head>
<body>
<div class="wrap">
<header>
<div class="brand"><h1>🧪 Water</h1><small>Sort</small></div>
<div class="scores">
<div class="score-box" id="score-box"><div class="lbl" data-i18n="score">Điểm</div><div class="val" id="score">0</div></div>
<div class="score-box" id="best-box"><div class="lbl" data-i18n="best">Kỷ lục</div><div class="val" id="best">0</div></div>
</div>
<button class="btn icon-btn" id="mute-btn" title="Âm thanh">🔊</button>
<button class="btn icon-btn" id="settings-btn" title="Cài đặt">⚙️</button>
</header>
<div class="info-bar"><span class="puzzle-name" id="puzzleName">Water Sort</span><span class="mistakes" id="mistakes"></span></div>
<div class="game-area">
<canvas id="gameCanvas"></canvas>
<div class="overlay" id="overlay"><div class="big" id="ov-title">🧪</div><p class="sub" id="ov-sub">Water Sort!</p><div class="ov-stats" id="ov-stats"></div><div class="ov-actions" id="ov-actions"></div></div>
<div class="toast" id="toast"></div>
</div>
</div>
<div class="modal-back" id="settings-modal">
<div class="modal" style="position:relative">
<button class="close-btn" onclick="closeModal('settings-modal')">&times;</button>
<h2>⚙️ <span data-i18n="settings">Cài đặt</span></h2>
<div class="setting-row"><span class="sl" data-i18n="sound">Âm thanh</span><div class="tgl on" id="sound-tgl"></div></div>
<div class="setting-row"><span class="sl" data-i18n="vibrate">Rung</span><div class="tgl on" id="vibrate-tgl"></div></div>
<div class="setting-row"><span class="sl" data-i18n="theme">Giao diện</span><select class="btn" id="theme-sel" style="font-size:12px;padding:6px 10px;min-height:36px"><option value="default">Mặc định</option><option value="light">Sáng</option><option value="sunset">Hoàng hôn</option></select></div>
<div class="setting-row"><span class="sl" data-i18n="language">Ngôn ngữ</span><div class="langrow"><button class="langbtn active" data-lang="vi">VI</button><button class="langbtn" data-lang="ja">JP</button><button class="langbtn" data-lang="en">EN</button></div></div>
<div style="margin-top:12px"><button class="btn primary" onclick="closeModal('settings-modal')" data-i18n="close">Đóng</button></div>
</div>
</div>
<script>
(function(){
'use strict';
var LANG={vi:{score:'Điểm',best:'Kỷ lục',settings:'Cài đặt',sound:'Âm thanh',vibrate:'Rung',theme:'Giao diện',language:'Ngôn ngữ',close:'Đóng',newGame:'Chơi lại',gameOver:'Hết nước!',newBest:'Kỷ lục mới! 🎉',scoreVal:'Điểm',bestVal:'Kỷ lục',moves:'Lượt',level:'Cấp'},ja:{score:'得点',best:'最高記録',settings:'設定',sound:'サウンド',vibrate:'振動',theme:'テーマ',language:'言語',close:'閉じる',newGame:'もう一度',gameOver:'終了！',newBest:'新記録！🎉',scoreVal:'得点',bestVal:'最高記録',moves:'手数',level:'レベル'},en:{score:'Score',best:'Best',settings:'Settings',sound:'Sound',vibrate:'Vibrate',theme:'Theme',language:'Language',close:'Close',newGame:'Retry',gameOver:'Stuck!',newBest:'New Best! 🎉',scoreVal:'Score',bestVal:'Best',moves:'Moves',level:'Level'}};
var lang='vi';function t(k){return(LANG[lang]&&LANG[lang][k])||k;}
function applyLang(){document.querySelectorAll('[data-i18n]').forEach(function(e){e.textContent=t(e.dataset.i18n);});document.querySelectorAll('.langbtn').forEach(function(b){b.classList.toggle('active',b.dataset.lang===lang);});}
var audioCtx=null;function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function playTone(f,d,t,g){if(!soundEnabled)return;try{var c=getAudio(),o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.value=f;g.gain.setValueAtTime(g||.12,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.connect(g);g.connect(c.destination);o.start(c.currentTime);o.stop(c.currentTime+d);}catch(e){}}
function playClick(){playTone(600,.08,'sine',.08);}function playPour(){playTone(440,.1,'triangle',.08);}function playWin(){playTone(523,.15,'sine',.10);setTimeout(function(){playTone(659,.15,'sine',.10)},150);setTimeout(function(){playTone(784,.2,'sine',.12)},300);}
var soundEnabled=true,vibrateEnabled=true;
var canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
var W=0,H=0,score=0,best=parseInt(localStorage.getItem('watersort_best'))||0;
var tubes=[],selectedTube=-1,moves=0,level=1,gameRunning=false;
var colors=['#e74c3c','#3498db','#2ecc71','#f1c40f','#9b59b6','#e67e22','#1abc9c','#e91e63','#00bcd4','#ff9800'];
var TUBE_COUNT=8,TUBE_HEIGHT=4,CELL=0;

function resizeCanvas(){
  var rect=canvas.parentElement.getBoundingClientRect();
  var s=Math.min(rect.width-10,rect.height-10,500);
  var dpr=devicePixelRatio;
  canvas.width=Math.round(s*dpr);canvas.height=Math.round(s*dpr);
  canvas.style.width=Math.round(s)+'px';canvas.style.height=Math.round(s)+'px';
  ctx.scale(dpr,dpr);W=s;H=s;CELL=Math.floor(s/(TUBE_COUNT+2));
}

function shuffle(arr){
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}

function initGame(){
  tubes=[];selectedTube=-1;moves=0;score=0;
  var numColors=TUBE_COUNT-2;
  var allColors=[];
  for(var i=0;i<numColors;i++){
    for(var j=0;j<TUBE_HEIGHT;j++)allColors.push(colors[i%colors.length]);
  }
  shuffle(allColors);
  var idx=0;
  for(var i=0;i<TUBE_COUNT;i++){
    var tube=[];
    for(var j=0;j<TUBE_HEIGHT;j++){
      if(idx<allColors.length){tube.push(allColors[idx]);idx++;}
    }
    tubes.push(tube);
  }
  gameRunning=true;
  document.getElementById('overlay').classList.remove('show');
  updateScore();updateBest();resizeCanvas();render();
}

function getTopColor(tube){
  for(var i=tube.length-1;i>=0;i--)if(tube[i])return tube[i];
  return null;
}

function countTopColor(tube){
  if(!tube.length)return 0;
  var color=getTopColor(tube);
  var count=0;
  for(var i=tube.length-1;i>=0;i--){
    if(tube[i]===color)count++;
    else break;
  }
  return count;
}

function isTubeComplete(tube){
  if(tube.length!==TUBE_HEIGHT)return false;
  var color=tube[0];
  for(var i=1;i<TUBE_HEIGHT;i++)if(tube[i]!==color)return false;
  return true;
}

function handleClick(e){
  if(!gameRunning)return;
  var rect=canvas.getBoundingClientRect();
  var mx=(e.clientX-rect.left),my=(e.clientY-rect.top);
  var ox=(W-TUBE_COUNT*CELL)/2,oy=(H-TUBE_HEIGHT*CELL)/2-10;
  var col=Math.floor((mx-ox)/CELL);
  if(col<0||col>=TUBE_COUNT)return;
  if(selectedTube===-1){
    // Select tube
    if(tubes[col].length>0){
      selectedTube=col;
      playClick();
      render();
    }
  }else{
    // Pour
    if(selectedTube===col){selectedTube=-1;render();return;}
    var src=tubes[selectedTube];
    var dst=tubes[col];
    if(!src.length){selectedTube=-1;render();return;}
    if(dst.length>=TUBE_HEIGHT){selectedTube=-1;render();return;}
    var srcColor=getTopColor(src);
    var dstColor=getTopColor(dst);
    if(dst.length>0&&srcColor!==dstColor){selectedTube=-1;render();return;}
    // Pour
    var pourCount=countTopColor(src);
    var space=TUBE_HEIGHT-dst.length;
    var actual=Math.min(pourCount,space);
    for(var i=0;i<actual;i++){
      var c=src.pop();
      dst.push(c);
    }
    moves++;score+=10;
    playPour();
    updateScore();
    selectedTube=-1;
    // Check win
    var won=true;
    for(var i=0;i<TUBE_COUNT;i++){
      if(tubes[i].length>0&&!isTubeComplete(tubes[i])){won=false;break;}
    }
    if(won){
      gameRunning=false;
      var isNew=saveBest();
      document.getElementById('ov-title').textContent='🎉';
      document.getElementById('ov-sub').textContent='Hoàn thành!';
      document.getElementById('ov-stats').innerHTML='<div><b>'+score+'</b><span>'+t('scoreVal')+'</span></div><div><b>'+moves+'</b><span>'+t('moves')+'</span></div>'+(isNew?'<div>'+t('newBest')+'</div>':'');
      document.getElementById('ov-actions').innerHTML='<button class="btn primary" onclick="nextLevel()">Cấp tiếp</button><button class="btn" onclick="initGame()">'+t('newGame')+'</button>';
      document.getElementById('overlay').classList.add('show');
      playWin();
    }
    render();
  }
}

function nextLevel(){
  level++;
  TUBE_COUNT=Math.min(8+Math.floor(level/2),14);
  initGame();
}

function render(){
  ctx.clearRect(0,0,W,H);
  var ox=(W-TUBE_COUNT*CELL)/2,oy=(H-TUBE_HEIGHT*CELL)/2-10;
  for(var i=0;i<TUBE_COUNT;i++){
    var x=ox+i*CELL,y=oy;
    // Tube background
    ctx.fillStyle='rgba(255,255,255,.04)';
    ctx.beginPath();ctx.roundRect(x+4,y,CELL-8,TUBE_HEIGHT*CELL,8);ctx.fill();
    ctx.strokeStyle=selectedTube===i?'#ffce54':'rgba(255,255,255,.12)';
    ctx.lineWidth=selectedTube===i?2:1;
    ctx.beginPath();ctx.roundRect(x+4,y,CELL-8,TUBE_HEIGHT*CELL,8);ctx.stroke();
    // Water layers
    var tube=tubes[i];
    for(var j=0;j<tube.length;j++){
      var wy=y+(TUBE_HEIGHT-1-j)*CELL;
      var wh=CELL-2;
      ctx.fillStyle=tube[j];
      ctx.beginPath();ctx.roundRect(x+6,wy+2,CELL-12,wh,4);ctx.fill();
      // Shine
      ctx.fillStyle='rgba(255,255,255,.15)';
      ctx.fillRect(x+8,wy+4,4,wh-6);
    }
    // Label
    ctx.fillStyle='rgba(255,255,255,.3)';
    ctx.font='10px sans-serif';ctx.textAlign='center';
    ctx.fillText(i+1,x+CELL/2,y+TUBE_HEIGHT*CELL+16);
  }
  document.getElementById('mistakes').textContent=t('moves')+': '+moves+' | '+t('level')+': '+level;
}

function updateScore(){
  document.getElementById('score').textContent=score;
  document.getElementById('score-box').classList.remove('bump');
  void document.getElementById('score-box').offsetWidth;
  document.getElementById('score-box').classList.add('bump');
}
function updateBest(){document.getElementById('best').textContent=best;}
function saveBest(){if(score>best){best=score;localStorage.setItem('watersort_best',best);updateBest();return true;}return false;}

function setupSettings(){
  document.getElementById('sound-tgl').addEventListener('click',function(){soundEnabled=!soundEnabled;this.classList.toggle('on',soundEnabled);document.getElementById('mute-btn').textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('mute-btn').addEventListener('click',function(){soundEnabled=!soundEnabled;document.getElementById('sound-tgl').classList.toggle('on',soundEnabled);this.textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('vibrate-tgl').addEventListener('click',function(){vibrateEnabled=!vibrateEnabled;this.classList.toggle('on',vibrateEnabled);});
  document.getElementById('theme-sel').addEventListener('change',function(){document.documentElement.setAttribute('data-theme',this.value);});
  document.querySelectorAll('.langbtn').forEach(function(el){el.addEventListener('click',function(){lang=this.dataset.lang;applyLang();});});
  document.getElementById('settings-btn').addEventListener('click',function(){document.getElementById('settings-modal').classList.add('show');});
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
canvas.addEventListener('mousedown',function(e){handleClick(e);});
canvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];handleClick({clientX:t.clientX,clientY:t.clientY});});
window.addEventListener('resize',function(){resizeCanvas();render();});
window.startGame=initGame;window.nextLevel=nextLevel;window.closeModal=closeModal;
setupSettings();applyLang();updateBest();resizeCanvas();initGame();
})();
</script>
</body>
</html>
