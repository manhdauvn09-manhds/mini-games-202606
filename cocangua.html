var colors=['#ff6b9d','#34e0ff','#ffce54','#b388ff'];
var players=[
  {name:'Bạn',color:0,pieces:[{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false}],finished:0},
  {name:'Bot1',color:1,pieces:[{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false}],finished:0},
  {name:'Bot2',color:2,pieces:[{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false}],finished:0},
  {name:'Bot3',color:3,pieces:[{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false},{pos:-1,home:false}],finished:0}
];
var currentPlayer=0,dice=0,canRoll=true,gameRunning=false,score=0,best=parseInt(localStorage.getItem('ludo_best'))||0;
var runStart=0,frozenEnd=0,moves=0;
function fmtTime(s){var m=Math.floor(s/60),ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
function elapsedSeconds(){return runStart?Math.floor(((gameRunning?Date.now():frozenEnd)-runStart)/1000):0;}
function refreshHud(){document.getElementById('time').textContent=fmtTime(elapsedSeconds());document.getElementById('moves').textContent=moves;}
var path=[]; // 52 positions around board
var startPos=[0,13,26,39]; // start for each player
var homeEntry=[50,11,24,37]; // entry to home stretch

function resizeCanvas(){
  var rect=canvas.parentElement.getBoundingClientRect();
  var s=Math.min(rect.width-10,rect.height-10,500);
  var dpr=devicePixelRatio;
  canvas.width=Math.round(s*dpr);canvas.height=Math.round(s*dpr);
  canvas.style.width=Math.round(s)+'px';canvas.style.height=Math.round(s)+'px';
  ctx.scale(dpr,dpr);BOARD=s;CELL=s/15;
}

function buildPath(){
  path=[];
  // Top row left->right (0-5)
  for(var i=0;i<6;i++)path.push({x:(i+3)*CELL,y:0});
  // Right column top->bottom (6-11)
  for(var i=0;i<6;i++)path.push({x:9*CELL,y:i*CELL});
  // Bottom row right->left (12-17)
  for(var i=0;i<6;i++)path.push({x:(9-i)*CELL,y:6*CELL});
  // Left column bottom->top (18-23)
  for(var i=0;i<6;i++)path.push({x:0,y:(6-i)*CELL});
  // Inner top (24-27)
  for(var i=0;i<4;i++)path.push({x:(i+4)*CELL,y:CELL});
  // Inner right (28-31)
  for(var i=0;i<4;i++)path.push({x:8*CELL,y:(i+1)*CELL});
  // Inner bottom (32-35)
  for(var i=0;i<4;i++)path.push({x:(8-i)*CELL,y:5*CELL});
  // Inner left (36-39)
  for(var i=0;i<4;i++)path.push({x:CELL,y:(5-i)*CELL});
  // Center cross (40-51)
  for(var i=0;i<6;i++)path.push({x:(i+3)*CELL,y:3*CELL});
  for(var i=0;i<6;i++)path.push({x:6*CELL,y:(i+3)*CELL});
}

function initGame(){
  for(var p=0;p<4;p++){
    for(var i=0;i<4;i++){
      players[p].pieces[i]={pos:-1,home:false};
    }
    players[p].finished=0;
  }
  currentPlayer=0;dice=0;canRoll=true;gameRunning=true;score=0;
  runStart=0;frozenEnd=0;moves=0;
  document.getElementById('overlay').classList.remove('show');
  updateScore();updateBest();buildPath();render();refreshHud();
}

function rollDice(){
  if(!gameRunning||!canRoll||currentPlayer!==0)return;
  if(!runStart)runStart=Date.now();
  moves++;
  dice=Math.floor(Math.random()*6)+1;
  canRoll=false;
  playClick();refreshHud();
  render();
  // Check if any piece can move
  var movable=getMovable(0,dice);
  if(movable.length===0){
    setTimeout(nextTurn,500);
  }
}

function getMovable(pid,steps){
  var p=players[pid];
  var movable=[];
  for(var i=0;i<4;i++){
    var pc=p.pieces[i];
    if(pc.home)continue;
    if(pc.pos===-1){
      if(steps===6)movable.push(i);
    }else{
      var np=pc.pos+steps;
      if(np<52)movable.push(i);
    }
  }
  return movable;
}

function movePiece(pidx,pieceIdx){
  var p=players[pidx];
  var pc=p.pieces[pieceIdx];
  if(pc.pos===-1){
    pc.pos=startPos[pidx];
    score+=10;
  }else{
    pc.pos+=dice;
    if(pc.pos>=52){pc.pos=52;pc.home=true;p.finished++;}
    score+=20;
  }
  // Check capture
  for(var op=0;op<4;op++){
    if(op===pidx)continue;
    for(var pi=0;pi<4;pi++){
      var opc=players[op].pieces[pi];
      if(!opc.home&&opc.pos!==-1&&opc.pos===pc.pos&&pc.pos<52){
        opc.pos=-1;
        score+=50;
      }
    }
  }
  playMove();
  updateScore();
  if(p.finished>=4){
    gameRunning=false;
    frozenEnd=Date.now();refreshHud();
    var isNew=saveBest();
    document.getElementById('ov-title').textContent='🏆';
    document.getElementById('ov-sub').textContent=t('gameOver');
    document.getElementById('ov-stats').innerHTML='<div><b>'+score+'</b><span>'+t('scoreVal')+'</span></div>'+(isNew?'<div>'+t('newBest')+'</div>':'');
    document.getElementById('ov-actions').innerHTML='<button class="btn primary" onclick="initGame()">'+t('newGame')+'</button>';
    document.getElementById('overlay').classList.add('show');
    playWin();
    return;
  }
  if(dice!==6)nextTurn();
  else{canRoll=true;dice=0;render();}
}

function nextTurn(){
  currentPlayer=(currentPlayer+1)%4;
  canRoll=true;dice=0;
  render();
  if(currentPlayer!==0){
    setTimeout(botTurn,600);
  }
}

function botTurn(){
  if(!gameRunning||currentPlayer===0)return;
  dice=Math.floor(Math.random()*6)+1;
  canRoll=false;
  var movable=getMovable(currentPlayer,dice);
  if(movable.length>0){
    var idx=movable[Math.floor(Math.random()*movable.length)];
    movePiece(currentPlayer,idx);
  }else{
    setTimeout(nextTurn,400);
  }
  render();
}

function handleClick(e){
  if(!gameRunning||currentPlayer!==0||canRoll)return;
  var rect=canvas.getBoundingClientRect();
  var dpr=devicePixelRatio;
  var mx=(e.clientX-rect.left)*dpr,my=(e.clientY-rect.top)*dpr;
  var p=players[0];
  for(var i=0;i<4;i++){
    var pc=p.pieces[i];
    if(pc.home)continue;
    var pos;
    if(pc.pos===-1){
      var hx=CELL*(1+3.5*(i%2)),hy=CELL*(1+3.5*Math.floor(i/2));
      pos={x:hx+CELL*0.5,y:hy+CELL*0.5};
    }else if(pc.pos<52){
      pos=path[pc.pos];
    }else continue;
    if(Math.abs(mx/dpr-pos.x)<CELL*0.8&&Math.abs(my/dpr-pos.y)<CELL*0.8){
      if(getMovable(0,dice).indexOf(i)>=0){
        movePiece(0,i);render();return;
      }
    }
  }
}

function render(){
  ctx.clearRect(0,0,canvas.width/devicePixelRatio,canvas.height/devicePixelRatio);
  var s=canvas.width/devicePixelRatio;
  // Board background
  ctx.fillStyle='rgba(255,255,255,.04)';
  ctx.beginPath();ctx.roundRect(0,0,s,s,12);ctx.fill();
  // Grid cells
  for(var r=0;r<15;r++){
    for(var c=0;c<15;c++){
      var x=c*CELL,y=r*CELL;
      ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=0.5;
      ctx.strokeRect(x,y,CELL,CELL);
    }
  }
  // Home bases
  var homes=[[{x:0,y:0},{x:0,y:6},{x:6,y:0},{x:6,y:6}]];
  for(var p=0;p<4;p++){
    var hx=homes[0][p].x*CELL,hy=homes[0][p].y*CELL;
    ctx.fillStyle=colors[p]+'22';
    ctx.beginPath();ctx.roundRect(hx+2,hy+2,6*CELL-4,6*CELL-4,8);ctx.fill();
    // Pieces in base
    for(var i=0;i<4;i++){
      var pc=players[p].pieces[i];
      if(pc.pos!==-1)continue;
      var px=hx+CELL*(1+3.5*(i%2)),py=hy+CELL*(1+3.5*Math.floor(i/2));
      ctx.fillStyle=colors[p];
      ctx.beginPath();ctx.arc(px+CELL/2,py+CELL/2,CELL*0.6,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font='bold '+Math.floor(CELL*0.5)+'px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p===0?'😊':'🤖',px+CELL/2,py+CELL/2);
    }
  }
  // Path pieces
  for(var p=0;p<4;p++){
    for(var i=0;i<4;i++){
      var pc=players[p].pieces[i];
      if(pc.pos<0||pc.pos>=52)continue;
      var pos=path[pc.pos];
      ctx.fillStyle=colors[p];
      ctx.beginPath();ctx.arc(pos.x+CELL/2,pos.y+CELL/2,CELL*0.55,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';
      ctx.font='bold '+Math.floor(CELL*0.4)+'px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(p===0?'😊':'🤖',pos.x+CELL/2,pos.y+CELL/2);
    }
  }
  // Home stretch
  for(var p=0;p<4;p++){
    for(var i=0;i<4;i++){
      if(players[p].pieces[i].home){
        ctx.fillStyle=colors[p];
        ctx.beginPath();ctx.arc(7.5*CELL,7.5*CELL,CELL*0.4,0,Math.PI*2);ctx.fill();
      }
    }
  }
  // Dice display
  ctx.fillStyle='rgba(255,255,255,.1)';
  ctx.beginPath();ctx.roundRect(s/2-30,s-50,60,36,10);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.font='bold 20px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(dice||'🎲',s/2,s-32);
  // Turn indicator
  ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('turn')+': '+players[currentPlayer].name,s/2,14);
  if(currentPlayer===0&&canRoll){
    ctx.fillStyle='rgba(255,206,84,.9)';
    ctx.beginPath();ctx.roundRect(s/2-40,s-90,80,28,14);ctx.fill();
    ctx.fillStyle='#1a1205';
    ctx.font='bold 12px sans-serif';
    ctx.fillText(t('roll'),s/2,s-76);
  }
  document.getElementById('mistakes').textContent=players.map(function(p,i){return p.name+': '+p.finished+'/4';}).join(' | ');
}

function updateScore(){
  document.getElementById('score').textContent=score;
  document.getElementById('score-box').classList.remove('bump');
  void document.getElementById('score-box').offsetWidth;
  document.getElementById('score-box').classList.add('bump');
}
function updateBest(){document.getElementById('best').textContent=best;}
function saveBest(){if(score>best){best=score;localStorage.setItem('ludo_best',best);updateBest();return true;}return false;}

function setupSettings(){
  document.getElementById('sound-tgl').addEventListener('click',function(){soundEnabled=!soundEnabled;this.classList.toggle('on',soundEnabled);document.getElementById('mute-btn').textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('mute-btn').addEventListener('click',function(){soundEnabled=!soundEnabled;document.getElementById('sound-tgl').classList.toggle('on',soundEnabled);this.textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('vibrate-tgl').addEventListener('click',function(){vibrateEnabled=!vibrateEnabled;this.classList.toggle('on',vibrateEnabled);});
  document.getElementById('theme-sel').addEventListener('change',function(){document.documentElement.setAttribute('data-theme',this.value);});
  document.querySelectorAll('.langbtn').forEach(function(el){el.addEventListener('click',function(){lang=this.dataset.lang;applyLang();});});
  document.getElementById('settings-btn').addEventListener('click',function(){document.getElementById('settings-modal').classList.add('show');});
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
canvas.addEventListener('mousedown',function(e){handleClick(e);if(canRoll&&currentPlayer===0)rollDice();});
canvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];handleClick({clientX:t.clientX,clientY:t.clientY});if(canRoll&&currentPlayer===0)rollDice();});
window.addEventListener('resize',function(){resizeCanvas();render();});
window.startGame=initGame;window.closeModal=closeModal;window.initGame=initGame;
setupSettings();applyLang();updateBest();resizeCanvas();initGame();
setInterval(refreshHud,300);
})();
</script>
</body>
</html>
