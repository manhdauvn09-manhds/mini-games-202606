function fmtTime(s){var m=Math.floor(s/60);var ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
function elapsedSeconds(){if(!runStart)return 0;return Math.floor(((gameRunning?Date.now():frozenEnd)-runStart)/1000);}
function refreshHUD(){document.getElementById('timeVal').textContent=fmtTime(elapsedSeconds());document.getElementById('movesVal').textContent=moves;}
setInterval(refreshHUD,300);
var emojis=['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐵','🐔','🐧','🐦','🐤','🦆','🦅'];

function resizeCanvas(){
  var rect=canvas.parentElement.getBoundingClientRect();
  var s=Math.min(rect.width-10,rect.height-10,500);
  var dpr=devicePixelRatio;
  canvas.width=Math.round(s*dpr);canvas.height=Math.round(s*dpr);
  canvas.style.width=Math.round(s)+'px';canvas.style.height=Math.round(s)+'px';
  ctx.setTransform(1,0,0,1,0,0);ctx.scale(dpr,dpr);
  CELL=Math.floor(s/Math.max(ROWS,COLS+2));
}

function initGrid(){
  var total=ROWS*COLS;
  var types=Math.floor(total/2);
  var pool=[];
  for(var i=0;i<types;i++)pool.push(emojis[i%emojis.length]);
  pool=pool.concat(pool.slice());
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  grid=[];var idx=0;
  for(var r=0;r<ROWS;r++){grid[r]=[];for(var c=0;c<COLS;c++){grid[r][c]=pool[idx++];}}
  remaining=total;
}

function isLineClear(r1,c1,r2,c2){
  if(r1===r2&&c1===c2)return false;
  if(grid[r1][c1]!==grid[r2][c2])return false;
  if(r1===r2){
    var minC=Math.min(c1,c2),maxC=Math.max(c1,c2);
    for(var c=minC+1;c<maxC;c++)if(grid[r1][c])return false;
    return true;
  }
  if(c1===c2){
    var minR=Math.min(r1,r2),maxR=Math.max(r1,r2);
    for(var r=minR+1;r<maxR;r++)if(grid[r][c1])return false;
    return true;
  }
  return false;
}

function canConnect(r1,c1,r2,c2){
  if(r1===r2&&c1===c2)return false;
  if(grid[r1][c1]!==grid[r2][c2])return false;
  if(isLineClear(r1,c1,r2,c2))return true;
  for(var c=0;c<COLS;c++){
    if(!grid[r1][c]&&!grid[r2][c]&&isLineClear(r1,c1,r1,c)&&isLineClear(r1,c,r2,c)&&isLineClear(r2,c,r2,c2))return true;
  }
  for(var r=0;r<ROWS;r++){
    if(!grid[r][c1]&&!grid[r][c2]&&isLineClear(r1,c1,r,c1)&&isLineClear(r,c1,r,c2)&&isLineClear(r,c2,r2,c2))return true;
  }
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      if(!grid[r][c]){
        if(isLineClear(r1,c1,r,c)&&isLineClear(r,c,r2,c2))return true;
      }
    }
  }
  return false;
}

function render(){
  var ox=(canvas.width/devicePixelRatio-COLS*CELL)/2,oy=20;
  ctx.clearRect(0,0,canvas.width/devicePixelRatio,canvas.height/devicePixelRatio);
  for(var r=0;r<ROWS;r++){
    for(var c=0;c<COLS;c++){
      var v=grid[r][c];
      if(!v)continue;
      var x=ox+c*CELL,y=oy+r*CELL;
      ctx.fillStyle='rgba(255,255,255,.06)';
      ctx.beginPath();ctx.roundRect(x+2,y+2,CELL-4,CELL-4,6);ctx.fill();
      ctx.font=Math.floor(CELL*0.65)+'px sans-serif';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(v,x+CELL/2,y+CELL/2);
      if(selected&&selected.r===r&&selected.c===c){
        ctx.strokeStyle='#ffce54';ctx.lineWidth=3;
        ctx.beginPath();ctx.roundRect(x+2,y+2,CELL-4,CELL-4,6);ctx.stroke();
      }
    }
  }
  ctx.fillStyle='rgba(255,255,255,.4)';
  ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText(t('remaining')+': '+remaining,canvas.width/devicePixelRatio/2,canvas.height/devicePixelRatio-10);
}

function handleClick(e){
  if(!gameRunning)return;
  var rect=canvas.getBoundingClientRect();
  var dpr=devicePixelRatio;
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  var ox=(canvas.width/dpr-COLS*CELL)/2,oy=20;
  var col=Math.floor((mx-ox)/CELL),row=Math.floor((my-oy)/CELL);
  if(col<0||col>=COLS||row<0||row>=ROWS)return;
  if(!grid[row][col])return;
  if(!selected){selected={r:row,c:col};playClick();render();return;}
  if(selected.r===row&&selected.c===col){selected=null;render();return;}
  if(canConnect(selected.r,selected.c,row,col)){
    grid[selected.r][selected.c]=null;grid[row][col]=null;
    if(!runStart)runStart=Date.now();
    remaining-=2;pairs++;moves++;score+=100;updateScore();refreshHUD();
    playMatch();selected=null;render();
    if(remaining===0){
      gameRunning=false;frozenEnd=Date.now();refreshHUD();
      var elapsed=Math.floor((Date.now()-startTime)/1000);
      var bonus=Math.max(0,300-elapsed);
      score+=bonus;updateScore();
      var isNew=saveBest();playWin();
      document.getElementById('ov-title').textContent='🎉';
      document.getElementById('ov-sub').textContent=t('gameOver');
      var m=Math.floor(elapsed/60),s=elapsed%60;
      document.getElementById('ov-stats').innerHTML='<div><b>'+score+'</b><span>'+t('scoreVal')+'</span></div><div><b>'+pairs+'</b><span>'+t('pairs')+'</span></div><div><b>'+m+':'+(s<10?'0':'')+s+'</b><span>'+t('time')+'</span></div>'+(isNew?'<div>'+t('newBest')+'</div>':'');
      document.getElementById('ov-actions').innerHTML='<button class="btn primary" onclick="startGame()">'+t('newGame')+'</button>';
      document.getElementById('overlay').classList.add('show');
    }
  }else{
    selected={r:row,c:col};playClick();render();
  }
}

function updateScore(){
  document.getElementById('score').textContent=score;
  document.getElementById('score-box').classList.remove('bump');
  void document.getElementById('score-box').offsetWidth;
  document.getElementById('score-box').classList.add('bump');
}
function updateBest(){document.getElementById('best').textContent=best;}
function saveBest(){if(score>best){best=score;localStorage.setItem('pikachu_best',best);updateBest();return true;}return false;}

function startGame(){
  initGrid();selected=null;pairs=0;score=0;gameRunning=true;startTime=Date.now();
  runStart=0;frozenEnd=0;moves=0;
  document.getElementById('overlay').classList.remove('show');
  updateScore();updateBest();refreshHUD();resizeCanvas();render();
}

function setupSettings(){
  document.getElementById('sound-tgl').addEventListener('click',function(){soundEnabled=!soundEnabled;this.classList.toggle('on',soundEnabled);document.getElementById('mute-btn').textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('mute-btn').addEventListener('click',function(){soundEnabled=!soundEnabled;document.getElementById('sound-tgl').classList.toggle('on',soundEnabled);this.textContent=soundEnabled?'🔊':'🔇';});
  document.getElementById('vibrate-tgl').addEventListener('click',function(){vibrateEnabled=!vibrateEnabled;this.classList.toggle('on',vibrateEnabled);});
  document.getElementById('theme-sel').addEventListener('change',function(){document.documentElement.setAttribute('data-theme',this.value);});
  document.querySelectorAll('.langbtn').forEach(function(el){el.addEventListener('click',function(){lang=this.dataset.lang;applyLang();});});
  document.getElementById('settings-btn').addEventListener('click',function(){document.getElementById('settings-modal').classList.add('show');});
}
function closeModal(id){document.getElementById(id).classList.remove('show');}
canvas.addEventListener('mousedown',function(e){handleClick(e);});
canvas.addEventListener('touchstart',function(e){e.preventDefault();var t=e.touches[0];handleClick({clientX:t.clientX,clientY:t.clientY});});
window.addEventListener('resize',function(){resizeCanvas();render();});
window.startGame=startGame;window.closeModal=closeModal;
setupSettings();applyLang();updateBest();resizeCanvas();startGame();
})();
</script>
</body>
</html>
